<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment Collection Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDKs (Compat version for script tags) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <!-- Chart.js และ DataLabels สำหรับแสดงตัวเลขในกราฟ -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        
        .table-container::-webkit-scrollbar { height: 8px; width: 8px; }
        .table-container::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .editable-cell {
            width: 100%;
            background: transparent;
            border: 1px solid transparent;
            padding: 4px 8px;
            border-radius: 4px;
            outline: none;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }
        .editable-cell:hover { border-color: #e2e8f0; background: #f8fafc; }
        .editable-cell:focus { border-color: #3b82f6; background: #ffffff; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
        
        /* สไตล์สำหรับหัวตาราง */
        .th-content {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding-right: 16px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        if (typeof ChartDataLabels !== 'undefined') {
            Chart.register(ChartDataLabels);
        }

        const { useState, useEffect, useRef } = React;

        // --- Component เลือกได้หลายค่า (Multi-Select Dropdown) ---
        const MultiSelect = ({ options, selected, onChange, placeholder = "ทั้งหมด" }) => {
            const [isOpen, setIsOpen] = useState(false);
            const dropdownRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [dropdownRef]);

            const toggleOption = (opt) => {
                if (selected.includes(opt)) onChange(selected.filter(x => x !== opt));
                else onChange([...selected, opt]);
            };

            return (
                <div className="relative inline-block text-left w-full md:w-auto" ref={dropdownRef}>
                    <button type="button" onClick={() => setIsOpen(!isOpen)} className="border border-slate-300 rounded-lg px-3 py-1.5 text-xs md:text-sm bg-white flex items-center justify-between w-full md:min-w-[140px] shadow-sm hover:bg-slate-50 transition-colors h-[38px]">
                        <span className="truncate pr-2 text-slate-700 font-medium">
                            {selected.length === 0 ? `${placeholder} (${options.length})` : `เลือกแล้ว ${selected.length} ทีม`}
                        </span>
                        <i className={`fa-solid fa-chevron-down text-[10px] md:text-xs text-slate-400 transition-transform duration-200 ${isOpen ? 'rotate-180' : ''}`}></i>
                    </button>
                    {isOpen && (
                        <div className="origin-top-left sm:origin-top-right absolute left-0 sm:left-auto sm:right-0 mt-2 w-56 max-w-[90vw] rounded-xl shadow-xl bg-white ring-1 ring-black ring-opacity-5 z-[100] overflow-hidden">
                            <div className="max-h-[50vh] sm:max-h-60 overflow-y-auto py-2 custom-scrollbar">
                                <label className="flex items-center px-4 py-2 hover:bg-blue-50 cursor-pointer transition-colors">
                                    <input type="checkbox" checked={selected.length === 0} onChange={() => onChange([])} className="mr-3 rounded border-slate-300 text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer" />
                                    <span className="text-sm font-bold text-slate-800">เลือกทั้งหมด</span>
                                </label>
                                <div className="h-px bg-slate-100 my-1"></div>
                                {options.map(opt => (
                                    <label key={opt} className="flex items-center px-4 py-2 hover:bg-slate-50 cursor-pointer transition-colors">
                                        <input type="checkbox" checked={selected.includes(opt)} onChange={() => toggleOption(opt)} className="mr-3 rounded border-slate-300 text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer" />
                                        <span className="text-sm text-slate-600 truncate" title={opt}>{opt}</span>
                                    </label>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- Component ซ่อน/แสดง คอลัมน์ ---
        const ColumnToggle = ({ columns, hiddenColumns, setHiddenColumns }) => {
            const [isOpen, setIsOpen] = useState(false);
            const dropdownRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [dropdownRef]);

            const toggleColumn = (col) => {
                if (hiddenColumns.includes(col)) {
                    setHiddenColumns(hiddenColumns.filter(c => c !== col));
                } else {
                    setHiddenColumns([...hiddenColumns, col]);
                }
            };

            const toggleAll = () => {
                if (hiddenColumns.length > 0) {
                    setHiddenColumns([]); // โชว์ทั้งหมด
                } else {
                    setHiddenColumns(columns); // ซ่อนทั้งหมด
                }
            };

            return (
                <div className="relative inline-block text-left" ref={dropdownRef}>
                    <button type="button" onClick={() => setIsOpen(!isOpen)} className="flex items-center gap-1.5 text-xs md:text-sm font-bold text-slate-700 bg-white hover:bg-slate-50 px-3 md:px-4 py-1.5 rounded-lg border border-slate-300 shadow-sm transition-colors h-[38px]">
                        <i className="fa-regular fa-eye text-slate-500"></i> <span className="hidden sm:inline">ซ่อน/แสดง คอลัมน์</span>
                        <i className={`fa-solid fa-chevron-down text-[10px] md:text-xs text-slate-400 ml-1 transition-transform duration-200 ${isOpen ? 'rotate-180' : ''}`}></i>
                    </button>
                    {isOpen && (
                        <div className="origin-top-left sm:origin-top-right absolute left-0 sm:left-auto sm:right-0 mt-2 w-64 max-w-[90vw] rounded-xl shadow-xl bg-white ring-1 ring-black ring-opacity-5 z-[100] overflow-hidden">
                            <div className="max-h-[50vh] sm:max-h-80 overflow-y-auto py-2 custom-scrollbar">
                                <label className="flex items-center px-4 py-2 hover:bg-blue-50 cursor-pointer transition-colors border-b border-slate-100">
                                    <input type="checkbox" checked={hiddenColumns.length === 0} onChange={toggleAll} className="mr-3 rounded border-slate-300 text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer" />
                                    <span className="text-sm font-bold text-slate-800">แสดงทั้งหมด</span>
                                </label>
                                {columns.map(col => (
                                    <label key={col} className="flex items-center px-4 py-2 hover:bg-slate-50 cursor-pointer transition-colors">
                                        <input 
                                            type="checkbox" 
                                            checked={!hiddenColumns.includes(col)} 
                                            onChange={() => toggleColumn(col)} 
                                            className="mr-3 rounded border-slate-300 text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer" 
                                        />
                                        <span className="text-sm text-slate-600 truncate" title={col}>{col}</span>
                                    </label>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- Component สำหรับวาดกราฟ Chart.js ---
        const ChartComponent = ({ type, data, options }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (chartInstance.current) {
                    chartInstance.current.destroy();
                }
                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, { type, data, options });
                
                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                };
            }, [type, data, options]);

            return <canvas ref={chartRef} style={{ width: '100%', height: '100%' }} />;
        };

        // ⚠️⚠️⚠️ ใส่ Firebase Config ของคุณตรงนี้ ⚠️⚠️⚠️
        const firebaseConfig = {
            apiKey: "AIzaSyBzHPhjjxRqcfno1QUkKUZddOPP_pota-Y",
            authDomain: "remove-equipment-tracking.firebaseapp.com",
            projectId: "remove-equipment-tracking",
            storageBucket: "remove-equipment-tracking.firebasestorage.app",
            messagingSenderId: "902157523949",
            appId: "1:902157523949:web:e5f4db82a028867f4da5e4",
            measurementId: "G-DT2FYYWJ26"
        };

        // ⚠️⚠️⚠️ นำลิงก์ Web App จาก Google Apps Script (ขั้นตอนที่ 2) มาวางที่นี่ ⚠️⚠️⚠️
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz1yVkUHzabwRZ4HCe0T6UqPdEFVrKtUkZt6apXYaz7KS51iwe5QjvGmK8f9lYcvyWd/exec"; 

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const collectionRef = db.collection('tasks');

        const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [tasks, setTasks] = useState([]);
          const [isLoading, setIsLoading] = useState(true);
          const [firebaseError, setFirebaseError] = useState(null); // เพิ่ม State สำหรับเก็บ Error
          
          // เช็คขนาดหน้าจอเพื่อปรับการแสดงผล Sidebar
          const [isSidebarOpen, setIsSidebarOpen] = useState(window.innerWidth > 768);
          
          const [columns, setColumns] = useState([]);
          const [hiddenColumns, setHiddenColumns] = useState([]); 
          const [keyMap, setKeyMap] = useState({ date: '', status: '', team: '', company: '', time: '' });

          const [currentDate, setCurrentDate] = useState(new Date());
          const [calendarView, setCalendarView] = useState('month');
          const [dashboardView, setDashboardView] = useState('overview'); 

          const [filterMonth, setFilterMonth] = useState('All');
          const [filterTeams, setFilterTeams] = useState([]);
          const [selectedStatuses, setSelectedStatuses] = useState([]);
          
          const [tableFilterTeams, setTableFilterTeams] = useState([]); 
          const [tableFilterCID, setTableFilterCID] = useState('All');
          const [tableFilterDate, setTableFilterDate] = useState('All');
          const [tableFilterYear, setTableFilterYear] = useState('All');
          const [tableFilterStatus, setTableFilterStatus] = useState('All');
          const [tableFilterOverdue, setTableFilterOverdue] = useState('All');
          const [searchTerm, setSearchTerm] = useState('');

          const [tooltipData, setTooltipData] = useState({ visible: false, task: null, x: 0, y: 0 });
          const [colWidths, setColWidths] = useState({}); 

          // --- Gemini AI State ---
          const [chatHistory, setChatHistory] = useState([
              { role: 'model', text: 'สวัสดีครับ! ผมคือผู้ช่วย AI ประจำแอปนี้ คุณสามารถถามข้อมูลสรุปจากตารางงาน เช่น "ทีมไหนมีงานค้างเยอะสุด" หรือ "ช่วยสรุปงานของวันนี้ให้หน่อย" ได้เลยครับ' }
          ]);
          const [chatInput, setChatInput] = useState('');
          const [isChatLoading, setIsChatLoading] = useState(false);
          const chatEndRef = useRef(null);

          // Auto-scroll chat
          useEffect(() => {
              if (chatEndRef.current) {
                  chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
              }
          }, [chatHistory, isChatLoading]);

          // ฟังก์ชันสำหรับลากปรับขนาดคอลัมน์
          const handleMouseDown = (e, col) => {
              e.preventDefault();
              const startX = e.pageX;
              const thElement = e.currentTarget.parentElement;
              const startWidth = thElement.getBoundingClientRect().width;

              const onMouseMove = (moveEvent) => {
                  const newWidth = Math.max(50, startWidth + (moveEvent.pageX - startX));
                  setColWidths(prev => ({ ...prev, [col]: newWidth }));
              };

              const onMouseUp = () => {
                  document.removeEventListener('mousemove', onMouseMove);
                  document.removeEventListener('mouseup', onMouseUp);
              };

              document.addEventListener('mousemove', onMouseMove);
              document.addEventListener('mouseup', onMouseUp);
          };

          const handleDoubleClickResize = (col) => {
              setColWidths(prev => {
                  const newWidths = { ...prev };
                  delete newWidths[col];
                  return newWidths;
              });
          };

          // ==========================================
          // ดึงข้อมูลจาก Firestore แบบ Real-time
          // ==========================================
          useEffect(() => {
              setIsLoading(true);
              setFirebaseError(null);
              const savedCols = localStorage.getItem('equip_tracker_columns');
              if (savedCols) setColumns(JSON.parse(savedCols));

              const unsubscribe = collectionRef.onSnapshot((snapshot) => {
                  console.log("Firebase Snapshot received, empty:", snapshot.empty, "size:", snapshot.size);
                  
                  if (snapshot.empty) {
                      setFirebaseError("ไม่พบข้อมูลใน Collection 'tasks' (อาจจะยังไม่ได้ดึงข้อมูลจาก Sheet หรือชื่อ Collection ผิด)");
                      setIsLoading(false);
                      return;
                  }

                  const newTasks = [];
                  let allCols = new Set(columns);
                  let metadataCols = null;

                  snapshot.forEach((doc) => {
                      // ดักจับเอกสารพิเศษที่เป็นลำดับคอลัมน์
                      if (doc.id === '_metadata') {
                          metadataCols = doc.data().columns;
                          return;
                      }

                      const data = doc.data();
                      const cleanData = { id: doc.id };
                      
                      Object.keys(data).forEach(key => {
                          if (key !== '_rowIndex') {
                              // ดึงข้อมูลที่ครอบด้วยโครงสร้าง JSON ของ Firebase ออกมา
                              cleanData[key] = typeof data[key] === 'object' && data[key] !== null && 'stringValue' in data[key] ? data[key].stringValue : data[key] ?? '';
                              allCols.add(key);
                          }
                      });
                      cleanData._rowIndex = data['_rowIndex']?.integerValue ?? data['_rowIndex'] ?? 0;
                      newTasks.push(cleanData);
                  });

                  // เรียงลำดับตามเลขแถว
                  newTasks.sort((a, b) => parseInt(a._rowIndex) - parseInt(b._rowIndex));
                  
                  setTasks(newTasks);
                  setFirebaseError(null); 
                  
                  // อัปเดตคอลัมน์ (ใช้ข้อมูลจาก _metadata เพื่อเรียงให้ตรงกับ Google Sheets)
                  if (metadataCols && Array.isArray(metadataCols)) {
                      setColumns(metadataCols);
                      localStorage.setItem('equip_tracker_columns', JSON.stringify(metadataCols));
                  } else if (allCols.size > columns.length) {
                      const colsArray = Array.from(allCols);
                      setColumns(colsArray);
                      localStorage.setItem('equip_tracker_columns', JSON.stringify(colsArray));
                  }
                  
                  localStorage.setItem('equip_tracker_tasks', JSON.stringify(newTasks));
                  setIsLoading(false);
              }, (error) => {
                  console.error("Firestore Listen Error:", error);
                  setFirebaseError(`การเชื่อมต่อ Firebase ผิดพลาด: ${error.message}`);
                  // ถ้าพัง ให้ดึงจากที่เซฟไว้แทนชั่วคราว
                  const savedTasks = localStorage.getItem('equip_tracker_tasks');
                  if (savedTasks && tasks.length === 0) {
                      setTasks(JSON.parse(savedTasks));
                  }
                  setIsLoading(false);
              });

              return () => unsubscribe();
              // eslint-disable-next-line react-hooks/exhaustive-deps
          }, []);

          // ประมวลผล KeyMap อัตโนมัติเมื่อ Columns เปลี่ยนแปลง
          useEffect(() => {
              if (columns.length > 0) {
                  const findCol = (keywords) => columns.find(c => keywords.some(kw => c.toLowerCase().includes(kw.toLowerCase()))) || '';
                  const colB = columns.length > 1 ? columns[1] : '';
                  const colC = columns.length > 2 ? columns[2] : '';
                  const colD = columns.length > 3 ? columns[3] : '';
                  const colE = columns.length > 4 ? columns[4] : '';
                  const colF = columns.length > 5 ? columns[5] : '';
                  const colG = columns.length > 6 ? columns[6] : '';
                  const statusCol = findCol(['สถานะ', 'status']) || columns[columns.length - 1] || '';

                  setKeyMap({
                      colB, colC, colD, colE, colF, colG,
                      date: colF || columns[0],
                      status: statusCol,
                      team: colB || findCol(['ทีม', 'subcontract', 'รับผิดชอบ']),
                      company: colC || findCol(['บริษัท', 'ลูกค้า', 'site', 'องค์กร']),
                      time: colG || findCol(['เวลา', 'time'])
                  });
              }
          }, [columns]);

          // ฟังก์ชันสำหรับเคลียร์ตัวกรองหน้าตารางทั้งหมด
          const resetFilters = () => {
              setTableFilterTeams([]);
              setTableFilterCID('All');
              setTableFilterDate('All');
              setTableFilterYear('All');
              setTableFilterStatus('All');
              setTableFilterOverdue('All');
              setSearchTerm('');
              // setHiddenColumns([]); 
          };

          // ==========================================
          // ถามคำถาม AI (Gemini API)
          // ==========================================
          const handleAskGemini = async (overridePrompt = null) => {
              const query = overridePrompt || chatInput;
              if (!query.trim()) return;

              setChatInput('');
              setChatHistory(prev => [...prev, { role: 'user', text: query }]);
              setIsChatLoading(true);

              const apiKey = ""; // <--- Execution environment provides the key automatically

              // กรองข้อมูลเฉพาะที่จำเป็นเพื่อส่งให้ AI (ป้องกัน Token เกินกำหนด)
              const dataContext = tasks.map(t => {
                  const essential = {};
                  if (keyMap.company && t[keyMap.company]) essential.company = t[keyMap.company];
                  if (keyMap.team && t[keyMap.team]) essential.team = t[keyMap.team];
                  if (keyMap.status && t[keyMap.status]) essential.status = t[keyMap.status];
                  if (keyMap.date && t[keyMap.date]) essential.date = t[keyMap.date];
                  if (keyMap.time && t[keyMap.time]) essential.time = t[keyMap.time];
                  return essential;
              });

              // จำกัดข้อมูล (ส่งข้อมูลไปแค่ 150 แถวเพื่อให้ประมวลผลเร็วและไม่เกินลิมิต)
              const limitedContext = dataContext.slice(0, 150);

              const systemPrompt = `คุณคือผู้ช่วย AI อัจฉริยะสำหรับแอปพลิเคชัน "EquipTracker" หน้าที่ของคุณคือการวิเคราะห์และตอบคำถามที่เกี่ยวข้องกับข้อมูลตารางงาน (Equipment Collection) โดยอิงจากข้อมูลรูปแบบ JSON ที่แนบมานี้เท่านั้น: ${JSON.stringify(limitedContext)}. กรุณาตอบเป็นภาษาไทย ให้สั้น กระชับ เข้าใจง่าย และใช้รูปแบบการจัดหน้า (Bullet points, Bold) ให้น่าอ่าน หากคำถามไม่อยู่ในข้อมูล ให้ตอบอย่างสุภาพว่าไม่ทราบข้อมูลส่วนนั้น`;

              const payload = {
                  contents: [{ parts: [{ text: query }] }],
                  systemInstruction: { parts: [{ text: systemPrompt }] }
              };

              const fetchWithRetry = async (url, options, retries = 5) => {
                  let delay = 1000;
                  for (let i = 0; i < retries; i++) {
                      try {
                          const response = await fetch(url, options);
                          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                          return await response.json();
                      } catch (error) {
                          if (i === retries - 1) throw error;
                          await new Promise(res => setTimeout(res, delay));
                          delay *= 2;
                      }
                  }
              };

              try {
                  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                  const data = await fetchWithRetry(url, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify(payload)
                  });

                  const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "ขออภัย ไม่สามารถประมวลผลคำตอบได้";
                  setChatHistory(prev => [...prev, { role: 'model', text: reply }]);
              } catch (error) {
