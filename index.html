<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Equipment Collection Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <!-- Chart.js และ DataLabels -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; overflow: hidden; }
        #root { height: 100%; }
        
        .table-container::-webkit-scrollbar { height: 8px; width: 8px; }
        .table-container::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .editable-cell {
            width: 100%; background: transparent; border: 1px solid transparent; padding: 4px 8px;
            border-radius: 4px; outline: none; transition: all 0.2s; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; display: block; cursor: pointer;
        }
        .editable-cell:hover { border-color: #e2e8f0; background: #f8fafc; }
        .editable-cell.editing { border-color: #3b82f6; background: #ffffff; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); cursor: text; }
        
        .th-content { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 16px; }
        .sortable-header { cursor: pointer; transition: background 0.2s; position: relative; }
        .sortable-header:hover { background-color: #334155 !important; }

        .line-preview {
            background-color: #84A98C;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
        }
        .line-bubble {
            background-color: #ffffff; border-radius: 18px; position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .line-bubble::after {
            content: ''; position: absolute; left: -8px; top: 12px;
            border-style: solid; border-width: 6px 10px 6px 0; border-color: transparent #ffffff transparent transparent;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        if (typeof ChartDataLabels !== 'undefined') {
            Chart.register(ChartDataLabels);
        }

        const { useState, useEffect, useRef, useMemo } = React;

        // --- Helper Functions ---
        const formatSheetDate = (val) => {
            if (typeof val !== 'string') return val;
            const isLongDate = val.match(/^[A-Z][a-z]{2} [A-Z][a-z]{2} \d{2} \d{4}/) || val.match(/^\d{4}-\d{2}-\d{2}T/);
            if (isLongDate) {
                const d = new Date(val);
                if (!isNaN(d.getTime())) {
                    if (d.getFullYear() === 1899) {
                        let h = d.getUTCHours() + 7;
                        if (h >= 24) h -= 24;
                        let m = d.getUTCMinutes();
                        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                    }
                    return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
                }
            }
            return val;
        };

        const parseDateHelper = (dateStr) => {
            if (!dateStr || typeof dateStr !== 'string') return null;
            let str = dateStr.trim().split(/[\sT]+/)[0]; 
            if (!str) return null;
            let match = str.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{2,4})$/);
            if (match) {
                let d = parseInt(match[1], 10);
                let m = parseInt(match[2], 10);
                let y = parseInt(match[3], 10);
                if (y < 100) { y += (y > 40 ? 2500 : 2000); }
                if (y > 2500) y -= 543;
                if (m > 12 && d <= 12) [d, m] = [m, d];
                return new Date(y, m - 1, d);
            }
            match = str.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})$/);
            if (match) {
                let y = parseInt(match[1], 10);
                let m = parseInt(match[2], 10);
                let d = parseInt(match[3], 10);
                if (y > 2500) y -= 543;
                return new Date(y, m - 1, d);
            }
            const dObj = new Date(str);
            if (!isNaN(dObj.getTime())) return dObj;
            return null;
        };

        // --- Multi-Select Component ---
        const MultiSelect = ({ options, selected, onChange, placeholder = "ทั้งหมด" }) => {
            const [isOpen, setIsOpen] = useState(false);
            const dropdownRef = useRef(null);
            useEffect(() => {
                const handleClickOutside = (event) => { if (dropdownRef.current && !dropdownRef.current.contains(event.target)) setIsOpen(false); };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);
            const toggleOption = (opt) => { if (selected.includes(opt)) onChange(selected.filter(x => x !== opt)); else onChange([...selected, opt]); };
            return (
                <div className="relative inline-block text-left w-full md:w-auto" ref={dropdownRef}>
                    <button type="button" onClick={() => setIsOpen(!isOpen)} className="border border-slate-300 rounded-lg px-3 py-1.5 text-xs md:text-sm bg-white flex items-center justify-between w-full md:min-w-[140px] shadow-sm hover:bg-slate-50 transition-colors h-[38px]">
                        <span className="truncate pr-2 text-slate-700 font-medium">{selected.length === 0 ? `${placeholder} (${options.length})` : `เลือกแล้ว ${selected.length} ทีม`}</span>
                        <i className={`fa-solid fa-chevron-down text-[10px] md:text-xs text-slate-400 transition-transform duration-200 ${isOpen ? 'rotate-180' : ''}`}></i>
                    </button>
                    {isOpen && (
                        <div className="origin-top-left sm:origin-top-right absolute left-0 sm:left-auto sm:right-0 mt-2 w-56 max-w-[90vw] rounded-xl shadow-xl bg-white ring-1 ring-black ring-opacity-5 z-[100] overflow-hidden">
                            <div className="max-h-[50vh] sm:max-h-60 overflow-y-auto py-2 custom-scrollbar">
                                <label className="flex items-center px-4 py-2 hover:bg-blue-50 cursor-pointer transition-colors">
                                    <input type="checkbox" checked={selected.length === 0} onChange={() => onChange([])} className="mr-3 rounded border-slate-300 text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer" />
                                    <span className="text-sm font-bold text-slate-800">เลือกทั้งหมด</span>
                                </label>
                                <div className="h-px bg-slate-100 my-1"></div>
                                {options.map(opt => (
                                    <label key={opt} className="flex items-center px-4 py-2 hover:bg-slate-50 cursor-pointer transition-colors">
                                        <input type="checkbox" checked={selected.includes(opt)} onChange={() => toggleOption(opt)} className="mr-3 rounded border-slate-300 text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer" />
                                        <span className="text-sm text-slate-600 truncate" title={opt}>{opt}</span>
                                    </label>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- ColumnToggle Component ---
        const ColumnToggle = ({ columns, hiddenColumns, setHiddenColumns }) => {
            const [isOpen, setIsOpen] = useState(false);
            const dropdownRef = useRef(null);
            useEffect(() => {
                const handleClickOutside = (event) => { if (dropdownRef.current && !dropdownRef.current.contains(event.target)) setIsOpen(false); };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);
            const toggleColumn = (col) => { if (hiddenColumns.includes(col)) setHiddenColumns(hiddenColumns.filter(c => c !== col)); else setHiddenColumns([...hiddenColumns, col]); };
            const toggleAll = () => { if (hiddenColumns.length > 0) setHiddenColumns([]); else setHiddenColumns(columns); };
            return (
                <div className="relative inline-block text-left" ref={dropdownRef}>
                    <button type="button" onClick={() => setIsOpen(!isOpen)} className="flex items-center gap-1.5 text-xs md:text-sm font-bold text-slate-700 bg-white hover:bg-slate-50 px-3 md:px-4 py-1.5 rounded-lg border border-slate-300 shadow-sm transition-colors h-[38px]">
                        <i className="fa-regular fa-eye text-slate-500"></i> <span className="hidden sm:inline">ซ่อน/แสดง คอลัมน์</span>
                        <i className={`fa-solid fa-chevron-down text-[10px] md:text-xs text-slate-400 ml-1 transition-transform duration-200 ${isOpen ? 'rotate-180' : ''}`}></i>
                    </button>
                    {isOpen && (
                        <div className="origin-top-left sm:origin-top-right absolute left-0 sm:left-auto sm:right-0 mt-2 w-64 max-w-[90vw] rounded-xl shadow-xl bg-white ring-1 ring-black ring-opacity-5 z-[100] overflow-hidden">
                            <div className="max-h-[50vh] sm:max-h-80 overflow-y-auto py-2 custom-scrollbar">
                                <label className="flex items-center px-4 py-2 hover:bg-blue-50 cursor-pointer transition-colors border-b border-slate-100">
                                    <input type="checkbox" checked={hiddenColumns.length === 0} onChange={toggleAll} className="mr-3 rounded border-slate-300 text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer" />
                                    <span className="text-sm font-bold text-slate-800">แสดงทั้งหมด</span>
                                </label>
                                {columns.map(col => (
                                    <label key={col} className="flex items-center px-4 py-2 hover:bg-slate-50 cursor-pointer transition-colors">
                                        <input type="checkbox" checked={!hiddenColumns.includes(col)} onChange={() => toggleColumn(col)} className="mr-3 rounded border-slate-300 text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer" />
                                        <span className="text-sm text-slate-600 truncate" title={col}>{col}</span>
                                    </label>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- Chart Component ---
        const ChartComponent = ({ type, data, options }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            useEffect(() => {
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, { type, data, options });
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [type, data, options]);
            return <canvas ref={chartRef} style={{ width: '100%', height: '100%' }} />;
        };

        // --- Draggable FAB ---
        const DraggableFAB = ({ onClick }) => {
            const [position, setPosition] = useState(() => ({ x: typeof window !== 'undefined' ? window.innerWidth - 80 : 0, y: typeof window !== 'undefined' ? window.innerHeight - 80 : 0 }));
            const draggingRef = useRef(false);
            const startPosRef = useRef({ x: 0, y: 0 });
            const fabRef = useRef(null);
            const dragDistance = useRef(0);
            const lastPos = useRef({ x: 0, y: 0 });
            useEffect(() => {
                const handleResize = () => {
                    setPosition(prev => {
                        let nx = prev.x, ny = prev.y;
                        if (nx > window.innerWidth - 70) nx = window.innerWidth - 80;
                        if (ny > window.innerHeight - 70) ny = window.innerHeight - 80;
                        return { x: nx, y: ny };
                    });
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);
            const onDown = (e) => {
                draggingRef.current = true; dragDistance.current = 0; lastPos.current = { x: e.clientX, y: e.clientY };
                const rect = fabRef.current.getBoundingClientRect();
                startPosRef.current = { offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top };
                e.currentTarget.setPointerCapture(e.pointerId);
            };
            const onMove = (e) => {
                if (!draggingRef.current) return;
                const dx = e.clientX - lastPos.current.x, dy = e.clientY - lastPos.current.y;
                dragDistance.current += Math.sqrt(dx * dx + dy * dy);
                lastPos.current = { x: e.clientX, y: e.clientY };
                let newX = e.clientX - startPosRef.current.offsetX, newY = e.clientY - startPosRef.current.offsetY;
                const maxX = document.documentElement.clientWidth - 60, maxY = document.documentElement.clientHeight - 60;
                newX = Math.max(10, Math.min(newX, maxX)); newY = Math.max(10, Math.min(newY, maxY));
                setPosition({ x: newX, y: newY });
            };
            const onUp = (e) => {
                draggingRef.current = false; e.currentTarget.releasePointerCapture(e.pointerId);
                if (dragDistance.current < 10) onClick();
            };
            return (
                <button ref={fabRef} onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} className="lg:hidden fixed z-[100] bg-blue-600 text-white w-14 h-14 rounded-full shadow-[0_4px_20px_rgba(37,99,235,0.5)] flex items-center justify-center transition-shadow touch-none" style={{ left: position.x, top: position.y }} title="เปิดเมนู (ลากเพื่อย้าย)">
                    <i className="fa-solid fa-bars text-2xl pointer-events-none"></i>
                </button>
            );
        };

        // -------------------------------------------------------------
        // --- COMPONENT: MASTER DATA MANAGEMENT ---
        // -------------------------------------------------------------
        const MasterDataTab = ({ masterData, masterDataRef }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [tempData, setTempData] = useState(masterData);

            useEffect(() => { setTempData(masterData); }, [masterData]);

            const handleSaveZone = (index, field, val) => {
                const newZones = [...tempData.zones];
                newZones[index][field] = val;
                setTempData({ ...tempData, zones: newZones });
            };
            const addZone = () => {
                const newZones = [...tempData.zones, { id: `zone_${Date.now()}`, name: `โซนใหม่ ${tempData.zones.length + 1}`, districts: "", teams: "" }];
                setTempData({ ...tempData, zones: newZones });
            };
            const delZone = (index) => {
                if(confirm('ยืนยันลบโซนนี้?')) {
                    const newZones = tempData.zones.filter((_, i) => i !== index);
                    setTempData({ ...tempData, zones: newZones });
                }
            };

            const handleSave = () => {
                const newTeamsArr = typeof tempData.teams === 'string' 
                    ? tempData.teams.split(',').map(t=>t.trim()).filter(Boolean) 
                    : tempData.teams;

                const dataToSave = {
                    zones: tempData.zones,
                    teams: newTeamsArr
                };

                masterDataRef.set(dataToSave, { merge: true });
                setIsEditing(false);
                alert('บันทึกข้อมูลเรียบร้อยแล้ว');
            };

            return (
                <div className="absolute inset-0 p-4 md:p-8 overflow-y-auto custom-scrollbar bg-slate-50">
                    <div className="max-w-6xl mx-auto">
                        <header className="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                            <div>
                                <h2 className="text-xl md:text-2xl font-bold text-slate-900"><i className="fa-solid fa-database text-blue-600 mr-2"></i> จัดการฐานข้อมูลส่วนกลาง (Master Data)</h2>
                                <p className="text-slate-500 mt-1 text-xs md:text-sm">จัดการโซน, ทีมงานทั้งหมด</p>
                            </div>
                            <div className="flex gap-2">
                                {!isEditing ? (
                                    <button onClick={() => setIsEditing(true)} className="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-semibold shadow-sm transition-colors text-sm flex items-center">
                                        <i className="fa-solid fa-pen-to-square mr-2"></i> แก้ไขข้อมูล
                                    </button>
                                ) : (
                                    <>
                                        <button onClick={() => { setIsEditing(false); setTempData(masterData); }} className="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-lg font-semibold transition-colors text-sm">
                                            ยกเลิก
                                        </button>
                                        <button onClick={handleSave} className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg font-bold shadow-sm transition-colors text-sm flex items-center">
                                            <i className="fa-solid fa-check mr-2"></i> ยืนยันการบันทึก
                                        </button>
                                    </>
                                )}
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="lg:col-span-1 space-y-6">
                                <div className={`p-5 rounded-xl border shadow-sm transition-colors ${isEditing ? 'bg-white border-blue-200 ring-1 ring-blue-100' : 'bg-slate-100/50 border-slate-200'}`}>
                                    <h3 className="font-bold text-slate-800 mb-3 flex items-center"><i className="fa-solid fa-users-gear text-indigo-500 mr-2"></i> ฐานข้อมูลทีมงานทั้งหมด</h3>
                                    <div>
                                        <label className="text-xs font-bold text-slate-500">รายชื่อทีม (คั่นด้วยลูกน้ำ ,)</label>
                                        <textarea 
                                            disabled={!isEditing}
                                            value={Array.isArray(tempData.teams) ? tempData.teams.join(', ') : tempData.teams} 
                                            onChange={e => setTempData({...tempData, teams: e.target.value})} 
                                            rows="8" 
                                            className="w-full mt-1 px-3 py-2 border border-slate-300 rounded-md outline-none focus:ring-2 focus:ring-indigo-500 text-sm disabled:bg-slate-100 disabled:text-slate-500" 
                                            placeholder="BA, TAS, ATG, ..."></textarea>
                                        <p className="text-[10px] text-slate-400 mt-1">ทีมงานในส่วนนี้จะถูกนำไปเป็นตัวเลือกในหน้า Assign Job</p>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-2">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-slate-800"><i className="fa-solid fa-map-location-dot text-amber-500 mr-2"></i> ฐานข้อมูลโซนพื้นที่ (Zones)</h3>
                                    {isEditing && (
                                        <button onClick={addZone} className="text-xs bg-amber-100 text-amber-700 hover:bg-amber-200 px-3 py-1.5 rounded-lg font-bold transition-colors">
                                            <i className="fa-solid fa-plus"></i> เพิ่มโซน
                                        </button>
                                    )}
                                </div>
                                
                                <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
                                    {tempData.zones.map((zone, idx) => (
                                        <div key={zone.id} className={`p-4 rounded-xl border shadow-sm relative transition-colors ${isEditing ? 'bg-white border-amber-200 hover:shadow-md' : 'bg-slate-100/50 border-slate-200'}`}>
                                            {isEditing && (
                                                <button onClick={() => delZone(idx)} className="absolute top-3 right-3 text-slate-300 hover:text-red-500 transition-colors"><i className="fa-solid fa-trash"></i></button>
                                            )}
                                            <div className="space-y-3">
                                                <div className="pr-6">
                                                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">ชื่อโซน</label>
                                                    <input 
                                                        type="text" 
                                                        disabled={!isEditing}
                                                        value={zone.name} 
                                                        onChange={e => handleSaveZone(idx, 'name', e.target.value)} 
                                                        className="w-full mt-0.5 px-2 py-1 border-b border-slate-200 bg-transparent outline-none focus:border-amber-500 text-sm font-bold text-slate-800 disabled:text-slate-600" 
                                                    />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">เขต/อำเภอ (คั่นด้วยลูกน้ำ ,)</label>
                                                    <textarea 
                                                        disabled={!isEditing}
                                                        value={zone.districts} 
                                                        onChange={e => handleSaveZone(idx, 'districts', e.target.value)} 
                                                        rows="2" 
                                                        className="w-full mt-0.5 px-2 py-1 border border-slate-200 rounded bg-slate-50 outline-none focus:ring-1 focus:ring-amber-500 text-xs disabled:bg-transparent disabled:border-transparent disabled:px-0" 
                                                        ></textarea>
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">ทีมที่รับผิดชอบ (เรียงตามคิว)</label>
                                                    <textarea 
                                                        disabled={!isEditing}
                                                        value={zone.teams} 
                                                        onChange={e => handleSaveZone(idx, 'teams', e.target.value)} 
                                                        rows="1" 
                                                        className="w-full mt-0.5 px-2 py-1 border border-slate-200 rounded bg-slate-50 outline-none focus:ring-1 focus:ring-amber-500 text-xs disabled:bg-transparent disabled:border-transparent disabled:px-0 font-semibold text-indigo-700" 
                                                        ></textarea>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // -------------------------------------------------------------
        // --- COMPONENT: ASSIGN JOB & LINE NOTIFY ---
        // -------------------------------------------------------------
        const AssignJobTab = ({ masterData, queueState, setQueueState, masterDataRef, collectionRef, GAS_WEB_APP_URL }) => {
            
            const getInitialFormState = () => {
                const now = new Date();
                return {
                    date: `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}/${now.getFullYear()} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`,
                    cid: '', districtSearch: '', zoneId: '', team: '', customerName: '', address: '', phone: '', cancelDate: '', details: '', nextTeam: ''
                };
            };

            const [form, setForm] = useState(getInitialFormState());
            const [equipments, setEquipments] = useState([{ name: '', serial: '' }]);
            const [isSending, setIsSending] = useState(false);

            const allDistrictsMap = useMemo(() => {
                let map = [];
                masterData.zones.forEach(z => {
                    const dists = z.districts.split(',').map(d => d.trim()).filter(Boolean);
                    dists.forEach(d => map.push({ name: d, zoneId: z.id, zoneName: z.name }));
                });
                return map.sort((a,b) => a.name.localeCompare(b.name, 'th'));
            }, [masterData.zones]);

                                        <input type="text" placeholder="Serial Number" value={eq.serial} onChange={e=>{let ne=[...equipments]; ne[i].serial=e.target.value; setEquipments(ne);}} className="flex-1 px-3 py-1 border rounded text-sm outline-none focus:border-blue-400" />

                                    <i className="fa-solid fa-paper-plane"></i> ยืนยันการจ่ายงาน & ส่งข้อความ
                                </button>
                                <button onClick={handleCopy} className="w-full mt-2 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-2 rounded-xl text-sm transition-colors">
                                    <i className="fa-regular fa-copy"></i> คัดลอกข้อความ
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Firebase Setup ---
        const firebaseConfig = {
            apiKey: "AIzaSyBzHPhjjxRqcfno1QUkKUZddOPP_pota-Y",

            measurementId: "G-DT2FYYWJ26"
        };
        // ⚠️ อย่าลืมอัปเดต URL นี้หลังจาก Deploy ใหม่ทุกครั้ง ⚠️
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxxTTwaRZfLgamI6d7tgcTv6dQe44WI5U_oHm1OjW-2eqhF5qSSdjLm_Q8sTlEAF6OM/exec";

        const db = firebase.firestore();

        const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

                { id: "zone_1", name: "โซน 1 (กทม. เหนือ/กลาง/นนทบุรี)", districts: "เขตพระนคร,เขตดุสิต,เขตบางซื่อ,เขตจตุจักร,เขตพญาไท,เมืองนนทบุรี,ปากเกร็ด", teams: "BA,TAS" },
                { id: "zone_2", name: "โซน 2 (กทม. ตะวันออก/ปทุมธานี)", districts: "เขตบางกะปิ,เขตมีนบุรี,เขตลาดกระบัง,คลองหลวง,ธัญบุรี,ลำลูกกา", teams: "ATG,NPY" },

                { id: "zone_4", name: "โซน 4 (กทม. ธนบุรี/ตะวันตก)", districts: "เขตธนบุรี,เขตบางกอกน้อย,เขตบางแค,บางใหญ่,บางบัวทอง,บางกรวย", teams: "JJ&A,SYMC" }

        // --- THE MAIN APP COMPONENT ---
        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [tasks, setTasks] = useState([]);
          const [isLoading, setIsLoading] = useState(true);
          const [firebaseError, setFirebaseError] = useState(null); 
          const [isSidebarOpen, setIsSidebarOpen] = useState(window.innerWidth > 1024);
          
          const [columns, setColumns] = useState([]);
          const [hiddenColumns, setHiddenColumns] = useState([]); 
          const [keyMap, setKeyMap] = useState({ date: '', status: '', team: '', company: '', time: '', contactName: '', phone: '' });

          const [currentDate, setCurrentDate] = useState(new Date());
          const [calendarView, setCalendarView] = useState('month');
          const [dashboardView, setDashboardView] = useState('overview'); 

          const [filterMonth, setFilterMonth] = useState('All');
          const [filterTeams, setFilterTeams] = useState([]);
          const [selectedStatuses, setSelectedStatuses] = useState([]);
          const [tableFilterTeams, setTableFilterTeams] = useState([]); 
          const [tableFilterCID, setTableFilterCID] = useState('All');
          const [tableFilterDate, setTableFilterDate] = useState('All');
          const [tableFilterYear, setTableFilterYear] = useState('All');
          const [tableFilterStatus, setTableFilterStatus] = useState('All');
          const [tableFilterOverdue, setTableFilterOverdue] = useState('All');
          const [searchTerm, setSearchTerm] = useState('');

          const [tooltipData, setTooltipData] = useState({ visible: false, task: null, x: 0, y: 0 });
          const [colWidths, setColWidths] = useState({}); 
          const [sortConfig, setSortConfig] = useState({ key: null, direction: null });
          const [editingCell, setEditingCell] = useState(null);

          const [historyLogs, setHistoryLogs] = useState([]);
          const [showHistoryModal, setShowHistoryModal] = useState(false);
          const [masterData, setMasterData] = useState(defaultMasterData);
          const [queueState, setQueueState] = useState({});
          
          const [isBackgroundSyncing, setIsBackgroundSyncing] = useState(false);
          const timeoutRef = useRef(null);

          useEffect(() => {
              setIsLoading(true); setFirebaseError(null);
              const savedCols = localStorage.getItem('equip_tracker_columns');
              if (savedCols) setColumns(JSON.parse(savedCols));

              const unsubMaster = masterDataRef.onSnapshot(doc => {
                  if (doc.exists && doc.data().zones) {
                      const data = doc.data();
                      setMasterData({
                          zones: data.zones || defaultMasterData.zones,
                          teams: Array.isArray(data.teams) ? data.teams : defaultMasterData.teams
                      });
                      if (data.queue) setQueueState(data.queue);
                  } else {
                      masterDataRef.set({ ...defaultMasterData, queue: {} }, { merge: true });
                  }
              });

              const unsubscribe = collectionRef.onSnapshot((snapshot) => {
                  if (snapshot.empty) {
                      setFirebaseError("ไม่พบข้อมูลใน Collection 'tasks'"); setIsLoading(false); return;
                  }
                  
                  let allCols = new Set(columns);
                  let metadataCols = null;
                  let isSyncingStatus = false;
                  
                  const realTasks = [];
                  const assignTasks = [];
                  const now = Date.now();

                  snapshot.forEach((doc) => {
                      if (doc.id === '_metadata') { metadataCols = doc.data().columns; return; }
                      
                      // อ่านสถานะ Sync Lock จาก Firebase เพื่อค้างหน้าจอไม่ให้วูบวาบ
                      if (doc.id === '_sync_status') {
                          const data = doc.data();
                          const ts = parseInt(data.timestamp?.integerValue) || 0;
                          if (data.status?.stringValue === 'syncing' && (now - ts < 15000)) {
                              isSyncingStatus = true;
                          }
                          return;
                      }

                      const data = doc.data();
                      const cleanData = { id: doc.id };
                      Object.keys(data).forEach(key => {
                          if (key !== '_rowIndex') {
                              let rawValue = typeof data[key] === 'object' && data[key] !== null && 'stringValue' in data[key] ? data[key].stringValue : data[key] ?? '';
                              cleanData[key] = formatSheetDate(rawValue);
                              allCols.add(key);
                          }
                      });
                      
                      let rIndex = 0;
                      if (data['_rowIndex'] && data['_rowIndex'].integerValue) {
                          rIndex = parseInt(data['_rowIndex'].integerValue);
                      } else if (data['_rowIndex'] !== undefined) {
                          rIndex = parseInt(data['_rowIndex']);
                      } else {
                          const parsed = parseInt(doc.id.replace('task_', '').replace('task_assign_', ''));
                          rIndex = isNaN(parsed) ? 999999 : parsed; 
                      }
                      
                      cleanData._rowIndex = rIndex || 0;
                      
                      if (doc.id.startsWith('task_assign_')) {
                          assignTasks.push(cleanData);
                      } else {
                          realTasks.push(cleanData);

                  if (isDA !== isDB) return isDA - isDB; 
                  const pT = (str) => { const m = str.match(/(\d{1,2}):(\d{2})/); return m ? parseInt(m[1], 10) * 60 + parseInt(m[2], 10) : 9999; };
                  return pT(a[timeCol] ? String(a[timeCol]).trim() : '') - pT(b[timeCol] ? String(b[timeCol]).trim() : '');
              });

                  </div>

                          {sortedStatuses.map((status, idx) => {

                              return (

                                      <div className="flex justify-between items-start"><p className="text-xs md:text-sm font-bold truncate pr-2 whitespace-normal leading-tight" title={status} style={{ color: text }}>{status}</p>{isSelected && selectedStatuses.length > 0 && <i className="fa-solid fa-circle-check text-xs md:text-sm mt-1" style={{ color: text }}></i>}</div>
                                      <p className="text-2xl md:text-4xl font-bold mt-2 md:mt-4" style={{ color: text }}>{statusCounts[status]}</p>
                                  </div>
                              );
                          })}
                      </div>
                      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 pb-6">

                                  ) : <p className="text-slate-400 flex h-full items-center justify-center">ไม่มีข้อมูล</p>}

                              <div className="relative h-64 md:h-80 w-full overflow-x-auto custom-scrollbar pb-2"><div className="min-w-[300px] h-full">{chartFilteredTasks.length > 0 ? <ChartComponent type="bar" data={overdueChartData} options={overdueChartOptions} /> : <p className="text-slate-400 text-center mt-20">ไม่มีข้อมูล</p>}</div></div>
                          </div>
                      </div>
                    </div>

                {/* --- 2. หน้าตารางงาน --- */}
                {activeTab === 'tasks' && (
                  <div className="absolute inset-0 flex flex-col p-2 md:p-4 lg:p-6 animate-in fade-in duration-500 overflow-hidden bg-slate-50 min-h-0">
                    <header className="shrink-0 flex flex-col md:flex-row justify-between items-start gap-4 mb-2">
                      <div className="flex items-center gap-3">
                        <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 bg-white border border-slate-200 shadow-sm rounded-lg hover:bg-slate-50 text-slate-600 transition-colors hidden lg:block"><i className="fa-solid fa-bars"></i></button>
                        <div><h2 className="text-xl md:text-3xl font-bold text-slate-900">ข้อมูลตารางงานทั้งหมด</h2></div>

                            <div className="relative w-full"><i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i><input type="text" placeholder="พิมพ์คำค้นหา..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full bg-slate-50 border border-slate-300 rounded-lg pl-10 pr-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium" /></div>

                            {teamCol && <div className="w-[calc(50%-4px)] sm:w-auto"><MultiSelect options={uniqueTeams} selected={tableFilterTeams} onChange={setTableFilterTeams} placeholder="ทีมงาน" /></div>}
                            {dateCol && <select value={tableFilterDate} onChange={e => setTableFilterDate(e.target.value)} className="border border-slate-300 rounded-lg px-2 py-1.5 text-xs md:text-sm bg-white outline-none w-[calc(50%-4px)] sm:w-auto md:max-w-[140px] truncate h-[38px]"><option value="All">เดือน (ทั้งหมด)</option>{uniqueColMonths.map(m => <option key={m} value={m.toString()}>{monthNames[m-1]}</option>)}</select>}

                            {isLoading ? <tr><td colSpan={Math.max(visibleColumns.length, 1)} className="p-8 text-center text-slate-500"><i className="fa-solid fa-circle-notch fa-spin text-blue-500 mr-2"></i>กำลังดึงข้อมูล...</td></tr>

                            : finalTableTasks.length === 0 ? <tr><td colSpan={Math.max(visibleColumns.length, 1)} className="p-8 text-center text-slate-500">ไม่พบข้อมูล...</td></tr>
                            : finalTableTasks.map((task) => (
                              <tr key={task.id} className={`transition-colors ${isBackgroundSyncing ? 'opacity-70 pointer-events-none' : 'hover:bg-slate-50'}`}>
                                {visibleColumns.map((col, idx) => {
                                    const hasFixedWidth = colWidths[col] !== undefined;
                                    const isStatusCell = col === statusCol, isTeamCell = col === teamCol, isOverDueCell = col === overDueCol; 
                                    const val = task[col] || '', cleanVal = getCleanStatus(val), cellId = `${task.id}-${col}`, isEditing = editingCell === cellId;
                                    let cellStyle = `editable-cell text-xs md:text-sm ${isEditing ? 'editing text-slate-800' : ''}`;
                                    let styleObj = {};
                                    
                                    if (isStatusCell) {
                                        styleObj = { backgroundColor: getStatusColor(cleanVal, 0.1), color: getStatusColor(cleanVal, 1), fontWeight: 'bold', borderRadius: '6px' };
                                    } else if (isTeamCell) {
                                        const tColor = getTeamColorStyle(val); styleObj = { backgroundColor: tColor.bg, color: tColor.text, border: `1px solid ${tColor.border}`, fontWeight: 'bold', textAlign: 'center', borderRadius: '6px' };
                                    } else if (isOverDueCell && cleanVal) {
                                        let num = NaN; const match = cleanVal.match(/-?\d+/); if(match) num = parseInt(match[0], 10);
                                        if (cleanVal.includes('เกิน') || cleanVal.includes('over') || num < 0) styleObj = { backgroundColor: '#fee2e2', color: '#991b1b', fontWeight: 'bold', textAlign: 'center', borderRadius: '6px' };
                                        else if (num === 0 || cleanVal.includes('ครบกำหนด') || cleanVal === '0') styleObj = { backgroundColor: '#fef08a', color: '#854d0e', fontWeight: 'bold', textAlign: 'center', borderRadius: '6px' }; 
                                        else if (num > 0 || cleanVal.includes('เหลือ')) styleObj = { backgroundColor: '#dcfce7', color: '#14532d', fontWeight: 'bold', textAlign: 'center', borderRadius: '6px' };
                                    }

                                    return (
                                        <td key={idx} className="p-1 md:p-1.5 align-middle border-r border-slate-100 overflow-hidden text-ellipsis" style={hasFixedWidth ? { width: colWidths[col], minWidth: colWidths[col], maxWidth: colWidths[col] } : { whiteSpace: 'nowrap' }}>
                                            {isStatusCell ? (
                                                <div className="flex items-stretch w-full transition-colors mx-auto" style={styleObj}>
                                                    <div contentEditable={isEditing} suppressContentEditableWarning={true} className={`flex-1 px-2 md:px-3 py-1 outline-none whitespace-nowrap overflow-hidden text-ellipsis text-center editable-cell ${isEditing ? 'editing text-slate-800' : ''}`} style={{ minHeight: '28px', lineHeight: '20px' }} onDoubleClick={(e) => handleCellDoubleClick(e, cellId)} onBlur={e => { handleCellChange(task.id, col, e.target.innerText); setEditingCell(null); }}>{val}</div>
                                                    <div className="relative w-5 md:w-6 flex-shrink-0 flex items-center justify-center hover:bg-black/10 rounded-r-md cursor-pointer"><i className="fa-solid fa-chevron-down text-[10px]"></i><select className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" value="" onChange={e => { if (e.target.value) handleCellChange(task.id, col, e.target.value); }}><option value="" disabled></option>{uniqueStatuses.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                                                </div>
                                            ) : (
                                                <div contentEditable={isEditing} suppressContentEditableWarning={true} className={cellStyle} style={{ ...styleObj, minHeight: '28px', cursor: isEditing ? 'text' : 'pointer' }} onDoubleClick={(e) => handleCellDoubleClick(e, cellId)} onBlur={e => { handleCellChange(task.id, col, e.target.innerText); setEditingCell(null); }}>{val}</div>
                                            )}
                                        </td>
                                    )
                                })}
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                      <div className="shrink-0 bg-slate-50 border-t border-slate-200 p-2 md:p-3 px-3 md:px-5 flex items-center justify-between z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                          <div className="text-xs md:text-sm font-semibold text-blue-700 flex items-center gap-2 bg-blue-100 px-3 py-1.5 rounded-lg border border-blue-200 shadow-sm"><i className="fa-solid fa-list-check"></i>แสดงผลทั้งหมด {finalTableTasks.length} รายการ</div>

                      </div>
                    </div>
                  </div>
                )}

                {/* --- 3. หน้าปฏิทิน --- */}
                {activeTab === 'calendar' && (
                  <div className="absolute inset-0 flex flex-col p-2 md:p-4 lg:p-6 animate-in fade-in duration-500 overflow-hidden bg-slate-50 min-h-0">
                    <header className="shrink-0 flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-4">
                      <div className="flex items-center gap-3">
                        <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 bg-white border border-slate-200 shadow-sm rounded-lg hover:bg-slate-50 text-slate-600 transition-colors hidden lg:block">
                            <i className="fa-solid fa-bars"></i>
                        </button>

                        </div>
                      </div>
                      <div className="flex flex-col items-end gap-3 w-full md:w-auto">
                        <div className="flex bg-slate-200 p-1 rounded-lg w-full sm:w-auto">
                          <button onClick={() => setCalendarView('day')} className={`flex-1 sm:flex-none px-3 md:px-4 py-1.5 text-xs md:text-sm font-semibold rounded-md ${calendarView === 'day' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600'}`}>รายวัน</button>
                          <button onClick={() => setCalendarView('week')} className={`flex-1 sm:flex-none px-3 md:px-4 py-1.5 text-xs md:text-sm font-semibold rounded-md ${calendarView === 'week' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600'}`}>สัปดาห์</button>
                          <button onClick={() => setCalendarView('month')} className={`flex-1 sm:flex-none px-3 md:px-4 py-1.5 text-xs md:text-sm font-semibold rounded-md ${calendarView === 'month' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600'}`}>เดือน</button>

                            {calendarView === 'week' && `สัปดาห์ที่ ${currentDate.getDate()} ${monthNames[currentDate.getMonth()]}`}
                            {calendarView === 'day' && `${currentDate.getDate()} ${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`}

                          <div className="flex gap-1 shrink-0">
                            <button onClick={() => navigateCalendar(-1)} className="p-1.5 md:p-2 bg-white border rounded-lg hover:bg-slate-50"><i className="fa-solid fa-chevron-left text-xs md:text-base"></i></button>

                          </div>
                        </div>
                      </div>
                    </header>

                    <div className="flex-1 flex flex-col min-h-0 overflow-hidden">
                      {calendarView === 'month' && (
                        <div className="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col min-h-0 overflow-hidden">
                          <div className="grid grid-cols-7 border-l border-t border-slate-200 shrink-0 bg-slate-50 z-10">
                            {['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'].map((d, i) => (
                              <div key={d} className="py-2 md:py-3 text-center text-xs md:text-sm font-semibold text-slate-600 border-r border-b border-slate-200">
                                  <span className="md:hidden">{d}</span>
                                  <span className="hidden md:inline">{['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'][i]}</span>
                              </div>
                            ))}
                          </div>

                                  return (
                                    <div key={idx} className="bg-white p-1 md:p-2 flex flex-col border-r border-b border-slate-200 group hover:bg-slate-50/50 transition-colors h-full overflow-hidden min-h-[100px]">

                                                const colDate = getCollectionDateCol() ? t[getCollectionDateCol()] : (t[keyMap.date] || '-');

                                                    <div className="text-slate-500 font-semibold truncate mb-0.5 text-[8px] md:text-[10px]">ทีม: {t[keyMap.team] || '-'}</div>
                                                    
                                                    {/* บริษัทลูกค้า */}

                                                    {/* วันที่และเวลา */}

                                                    {/* Status */}
                                                    <div className="mt-1 text-center font-bold px-1 py-0.5 rounded border text-[8px] md:text-[10px] truncate" style={{backgroundColor: softBg, color: border, borderColor: border}}>
                                                        {t[statusCol] || 'ไม่มีสถานะ'}
                                                    </div>
                                                  </div>
                                                );
                                            })}
                                          </div>
                                        </>
                                      )}
                                    </div>
                                  );
                                })}
                              </div>
                          </div>
                        </div>
                      )}

                      {calendarView === 'week' && (
                        <div className="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col min-h-0 overflow-hidden">

                            {weekSlots.map((dateObj, idx) => (
                              <div key={idx} className="py-2 md:py-3 text-center border-r border-b border-slate-200">
                                <div className="text-[10px] md:text-sm font-semibold text-slate-500">
                                    <span className="md:hidden">{['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'][dateObj.getDay()]}</span>
                                    <span className="hidden md:inline">{['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'][dateObj.getDay()]}</span>
                                </div>
                                <div 
                                  onClick={() => { setCalendarView('day'); setCurrentDate(dateObj); }}
                                  title="คลิกเพื่อดูรายละเอียดรายวัน"
                                  className={`text-base md:text-2xl font-bold mt-1 cursor-pointer transition-colors inline-block px-2 md:px-3 py-0.5 md:py-1 rounded-lg hover:bg-blue-100 hover:text-blue-700 ${dateObj.getDate() === new Date().getDate() && dateObj.getMonth() === new Date().getMonth() ? 'text-blue-600' : 'text-slate-800'}`}

                                    <div key={`w-${idx}`} className="bg-white p-1 md:p-2 flex flex-col gap-1.5 md:gap-2 bg-slate-50/30 border-r border-b border-slate-200 h-full overflow-hidden min-h-0">
                                        <div className="flex-1 overflow-y-auto custom-scrollbar pr-1 space-y-1.5 min-h-0">
                                            {dayTasks.map(t => {
                                                const border = getStatusColor(t[statusCol] || '', 1);
                                                const softBg = getStatusColor(t[statusCol] || '', 0.1);
                                                
                                                const colDate = getCollectionDateCol() ? t[getCollectionDateCol()] : (t[keyMap.date] || '-');
                                                const colTime = t[keyMap.time] || '-';

                                                return (
                                                  <div key={t.id} style={{borderLeftColor: border}} className="p-1.5 md:p-3 rounded-lg md:rounded-xl border border-l-2 md:border-l-4 shadow-sm bg-white text-[10px] md:text-xs space-y-1 md:space-y-1.5 cursor-pointer hover:shadow-md transition-shadow" onMouseMove={(e) => handleMouseMove(e, t)} onMouseLeave={handleMouseLeave} onClick={() => { if(window.innerWidth <= 1024) { setCalendarView('day'); setCurrentDate(dateObj); } }}>
                                                    {/* 1. ทีมงาน */}
                                                    <div className="text-slate-500 font-semibold truncate mb-0.5">ทีม: {t[keyMap.team] || '-'}</div>
                                                    
                                                    {/* 2. ชื่อบริษัทลูกค้า */}
                                                    <div className="font-bold text-slate-800 break-words leading-tight line-clamp-2">{t[keyMap.company] || 'ไม่ระบุชื่อ'}</div>

                                                    <div className="flex items-center gap-1 text-slate-600 font-medium px-1 py-0.5 rounded text-[8px] md:text-[10px] w-fit mt-1">

                                                    </div>
                                                    
                                                    {/* 4. Status */}
                                                    <div className="mt-1.5 text-center font-bold px-1 md:px-2 py-0.5 md:py-1 rounded-md md:rounded-lg border text-[8px] md:text-[10px]" style={{backgroundColor: softBg, color: border, borderColor: border}}>{t[statusCol]}</div>
                                                  </div>
                                                )
                                            })}
                                        </div>
                                    </div>
                                  );
                                })}
                            </div>
                          </div>
                        </div>

                      {calendarView === 'day' && (() => {

                        return (
                          <div className="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col p-4 md:p-6 min-h-0 overflow-hidden">
                            <h4 className="text-base md:text-lg font-bold text-slate-800 mb-4 md:mb-6 border-b pb-3 md:pb-4 flex justify-between items-center shrink-0">
                              <span><i className="fa-regular fa-calendar-check text-blue-600 mr-2"></i> ตารางงานประจำวัน</span>

                            <div className="flex-1 overflow-y-auto custom-scrollbar pr-2">
                                {dayTasks.length === 0 ? (

                                      <p className="text-sm md:text-lg font-medium">ไม่มีงานที่ต้องดำเนินการในวันนี้</p>
                                  </div>
                                ) : (
                                  <div className="space-y-3 md:space-y-4">
                                    {dayTasks.map(t => {
                                        const bgColor = getStatusColor(t[statusCol] || '', 1);
                                        const softBg = getStatusColor(t[statusCol] || '', 0.1);
                                        
                                        const cidVal = cidCol ? t[cidCol] : '';
                                        const companyVal = t[keyMap.company] || '-';
                                        
                                        const contactVal = (keyMap.contactName && t[keyMap.contactName]) ? t[keyMap.contactName] : 'ไม่ระบุ';
                                        const phoneVal = (keyMap.phone && t[keyMap.phone]) ? t[keyMap.phone] : '';
                                        
                                        const collDateCol = getCollectionDateCol();
                                        const collectionDateVal = collDateCol ? t[collDateCol] : (t[keyMap.date] || '-');
                                        const collectionTimeVal = t[keyMap.time] || '-';
                                        
                                        return (
                                          <div key={t.id} className="flex bg-white rounded-xl md:rounded-2xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition-shadow cursor-pointer relative" onMouseMove={(e) => handleMouseMove(e, t)} onMouseLeave={handleMouseLeave}>

                                            <div className="p-3 md:p-4 flex-1 flex flex-col text-xs md:text-sm min-w-0">
                                                <div className="flex flex-col lg:flex-row gap-3 md:gap-4 lg:items-center w-full min-w-0">
                                                    
                                                    {/* กลุ่มข้อมูลด้านซ้าย */}
                                                    <div className="flex-1 flex flex-col lg:flex-row gap-3 lg:gap-4 lg:items-center min-w-0">
                                                        
                                                        {/* 1. ทีมงาน */}
                                                        <div className="flex flex-col justify-center items-start shrink-0 lg:pr-4 lg:border-r border-slate-200">
                                                            <p className="text-[10px] md:text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">ทีมงาน</p>
                                                            <div className="px-2 py-1 md:py-1.5 rounded-md text-sm md:text-base font-bold border w-24 md:w-32 text-center truncate shadow-sm" style={{ backgroundColor: getTeamColorStyle(t[keyMap.team]).bg, color: getTeamColorStyle(t[keyMap.team]).text, borderColor: getTeamColorStyle(t[keyMap.team]).border }} title={t[keyMap.team] || 'ไม่ระบุทีม'}>

                                                                <span>{companyVal}</span>

                                                                    <p>{collectionDateVal}</p>
                                                                    {collectionTimeVal !== '-' && (
                                                                        <p><i className="fa-regular fa-clock mr-1 text-slate-500 text-sm"></i>{collectionTimeVal}</p>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        </div>
                                                        
                                                    </div>

                                                    {/* 5. Status */}
                                                    <div className="flex justify-start lg:justify-end mt-2 lg:mt-0 shrink-0 border-t lg:border-t-0 lg:border-l border-slate-200 pt-3 lg:pt-0 lg:pl-4">
                                                        <span style={{backgroundColor: softBg, color: bgColor, borderColor: bgColor}} className="font-bold px-4 md:px-6 py-1.5 md:py-2 rounded-lg md:rounded-xl border-2 text-center min-w-[120px] md:min-w-[140px] shadow-sm">
                                                            {t[statusCol] || 'ไม่มีสถานะ'}
                                                        </span>
                                                    </div>
                                                </div>

                                                {/* 6. หมายเหตุเพิ่มเติม */}
                                                {noteCol && t[noteCol] && (
                                                    <div className="mt-3 pt-3 border-t border-slate-100 w-full">
                                                        <p className="text-[10px] md:text-xs text-amber-600 font-semibold uppercase tracking-wider">หมายเหตุเพิ่มเติม</p>
                                                        <p className="text-slate-600 text-xs mt-0.5 break-words">{t[noteCol]}</p>
                                                    </div>
                                                )}
                                            </div>
                                          </div>
                                        )
                                    })}
                                  </div>
                                )}
                            </div>
                          </div>
                        );
                      })()}
                    </div>
                  </div>
                )}

                {/* --- 4. หน้า MASTER DATA --- */}
                {activeTab === 'master_data' && <MasterDataTab masterData={masterData} masterDataRef={masterDataRef} />}

                {/* --- 5. หน้า ASSIGN JOB --- */}
                {activeTab === 'assign' && <AssignJobTab masterData={masterData} queueState={queueState} setQueueState={setQueueState} masterDataRef={masterDataRef} collectionRef={collectionRef} GAS_WEB_APP_URL={GAS_WEB_APP_URL} />}

              </main>

              {/* Tooltip Component */}
              {tooltipData.visible && tooltipData.task && (
                <div className="fixed z-[9999] bg-white p-4 md:p-5 rounded-xl shadow-2xl border border-slate-200 w-[280px] md:w-80 pointer-events-none transition-opacity duration-150" style={{ left: tooltipData.x, top: tooltipData.y }}>
                    <div className="flex justify-between items-start mb-3 border-b pb-2"><h4 className="font-bold text-slate-800 text-sm break-words pr-2">{tooltipData.task[compCol] || 'ไม่ระบุองค์กร'}</h4></div>
                    <div className="space-y-2 text-[11px] md:text-xs text-slate-600 max-h-[250px] overflow-y-auto pr-1 table-container">
                        {columns.map(col => {
                            if (skipColsInTooltip.includes(col)) return null;
                            const val = tooltipData.task[col]; if (!val || String(val).trim() === '') return null;
                            return (<div key={col} className="flex flex-col"><span className="font-semibold text-[9px] text-slate-400 uppercase">{col}</span><span className="text-slate-800 font-medium">{val}</span></div>)
                        })}
                    </div>
                </div>
              )}

              {/* History Modal */}
              {showHistoryModal && (
                  <div className="fixed inset-0 z-[1000] flex items-center justify-center bg-slate-900/60 p-4 animate-in fade-in">
                      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[85vh] flex flex-col overflow-hidden">
                          <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50 shrink-0">
                              <h2 className="text-lg font-bold text-slate-800"><i className="fa-solid fa-clock-rotate-left text-indigo-600 mr-2"></i> ประวัติการแก้ไขข้อมูล (ล่าสุด 50 รายการ)</h2>
                              <button onClick={() => setShowHistoryModal(false)} className="w-8 h-8 flex justify-center items-center rounded-full bg-white hover:bg-slate-200 text-slate-500 shadow-sm border transition-colors"><i className="fa-solid fa-xmark"></i></button>
                          </div>
                          <div className="flex-1 overflow-y-auto p-4 bg-slate-100/50">
                              {historyLogs.length === 0 ? (
                                  <div className="text-center py-10 text-slate-400"><i className="fa-regular fa-folder-open text-4xl mb-3"></i><p>ยังไม่มีประวัติการแก้ไขข้อมูล</p></div>
                              ) : (
                                  <div className="space-y-3">
                                      {historyLogs.map(log => {
                                          const dateStr = log.updatedAt ? new Date(log.updatedAt.toDate()).toLocaleString('th-TH') : 'กำลังบันทึก...';
                                          return (
                                              <div key={log.id} className="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row md:items-center gap-3">
                                                  <div className="w-full md:w-1/4 shrink-0 border-r border-slate-100">
                                                      <p className="text-[10px] text-slate-400 font-bold uppercase"><i className="fa-regular fa-clock"></i> {dateStr}</p>
                                                      <p className="text-xs font-bold text-slate-700 mt-1 line-clamp-1">{log.company}</p>
                                                  </div>
                                                  <div className="flex-1 flex flex-col sm:flex-row items-start sm:items-center gap-2 sm:gap-4 text-sm">
                                                      <span className="bg-slate-100 text-slate-600 px-2 py-1 rounded text-xs font-semibold shrink-0">คอลัมน์: {log.field}</span>
                                                      <div className="flex items-center gap-2 w-full">
                                                          <span className="line-through text-red-500 bg-red-50 px-2 py-0.5 rounded truncate max-w-[150px]" title={log.oldValue}>{log.oldValue || '-ว่าง-'}</span>
                                                          <i className="fa-solid fa-arrow-right-long text-slate-300 shrink-0"></i>
                                                          <span className="text-emerald-600 font-bold bg-emerald-50 px-2 py-0.5 rounded truncate flex-1" title={log.newValue}>{log.newValue || '-ว่าง-'}</span>
                                                      </div>
                                                  </div>
                                              </div>
                                          )
                                      })}
                                  </div>
                              )}
                          </div>
                      </div>
                  </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
