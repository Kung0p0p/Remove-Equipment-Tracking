            <button onClick={() => { setActiveTab(id); if(window.innerWidth <= 768) setIsSidebarOpen(false); }} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors ${activeTab === id ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
              <i className={`${iconClass} text-lg w-6 text-center`}></i>
              <span className="font-medium whitespace-nowrap">{label}</span>
            </button>
          );

          const skipColsInTooltip = [
              compCol, teamCol, dateCol, timeCol,
              columns.find(c => c.toLowerCase().includes('แจ้ง subcontract') || c.includes('แจ้ง Sub')),
              columns.find(c => c.toLowerCase().includes('อีเมล') || c.toLowerCase().includes('email') || c.toLowerCase().includes('mail')),
              columns.find(c => c.toLowerCase().includes('year') || c.includes('ปี')),
              columns.find(c => {
                  const lowerC = c.toLowerCase().replace(/\s+/g, '');
                  return lowerC.includes('นัดหมายลูกค้า') || lowerC.includes('over3') || lowerC.includes('เกินกำหนด');
              }),
              columns.find(c => c.includes('วันที่โทร') || c.includes('โทรติดต่อ'))
          ].filter(Boolean);

          const visibleColumns = columns.filter(col => !hiddenColumns.includes(col));

          return (
            <div className="flex h-screen bg-slate-50 text-slate-900 overflow-hidden relative">
              
              {/* Floating Menu Button for Mobile (ปุ่มลอยสำหรับมือถือ ไม่ต้องเลื่อนจอขึ้น) */}
              <button 
                  onClick={() => setIsSidebarOpen(true)}
                  className="md:hidden fixed bottom-6 right-6 z-40 bg-blue-600 text-white w-14 h-14 rounded-full shadow-[0_4px_15px_rgba(37,99,235,0.4)] flex items-center justify-center active:scale-95 transition-transform"
              >
                  <i className="fa-solid fa-bars text-xl"></i>
              </button>

              {/* พื้นหลังเวลาเปิด Sidebar บนมือถือ */}
              {isSidebarOpen && (
                  <div className="fixed inset-0 bg-slate-900/50 z-20 md:hidden" onClick={() => setIsSidebarOpen(false)}></div>
              )}

              <aside className={`bg-slate-900 text-white flex flex-col shadow-xl z-30 shrink-0 transition-all duration-300 ease-in-out absolute md:relative h-full ${isSidebarOpen ? 'w-64 translate-x-0' : 'w-0 -translate-x-full md:translate-x-0 overflow-hidden'}`}>
                <div className="p-6 h-20 flex items-center">
                  <h1 className="text-xl font-bold flex items-center gap-2 whitespace-nowrap"><i className="fa-solid fa-truck-fast text-blue-400"></i><span>EquipTracker</span></h1>
                </div>
                <nav className="flex-1 px-4 space-y-2 overflow-y-auto">
                  <div className="space-y-1">
                    <button onClick={() => { setActiveTab('dashboard'); if(window.innerWidth <= 768) setIsSidebarOpen(false); }} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'dashboard' ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                      <i className="fa-solid fa-chart-pie text-lg w-6 text-center"></i>
                      <span className="font-medium whitespace-nowrap">ภาพรวม (Dashboard)</span>
                    </button>
                    {activeTab === 'dashboard' && isSidebarOpen && (
                        <div className="pl-12 pr-4 space-y-1 pb-2">
                            <button onClick={() => { setDashboardView('overview'); if(window.innerWidth <= 768) setIsSidebarOpen(false); }} className={`w-full text-left px-3 py-2 text-sm rounded-lg transition-colors ${dashboardView === 'overview' ? 'bg-slate-800 text-white font-semibold' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>- ภาพรวมทั้งหมด</button>
                            <button onClick={() => { setDashboardView('2026'); if(window.innerWidth <= 768) setIsSidebarOpen(false); }} className={`w-full text-left px-3 py-2 text-sm rounded-lg transition-colors ${dashboardView === '2026' ? 'bg-slate-800 text-white font-semibold' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>- ปี 2026 (ปัจจุบัน)</button>
                            <button onClick={() => { setDashboardView('history'); if(window.innerWidth <= 768) setIsSidebarOpen(false); }} className={`w-full text-left px-3 py-2 text-sm rounded-lg transition-colors ${dashboardView === 'history' ? 'bg-slate-800 text-white font-semibold' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>- ปี 2018 - 2025</button>
                        </div>
                    )}
                  </div>

                  <SidebarItem id="tasks" iconClass="fa-solid fa-table-list" label="ตารางงาน (All Data)" />
                  <SidebarItem id="calendar" iconClass="fa-solid fa-calendar-days" label="ปฏิทิน (Timeline)" />
                  
                  {/* เพิ่มเมนู ผู้ช่วย AI (Gemini) */}
                  <div className="pt-2 mt-2 border-t border-slate-700/50">
                    <SidebarItem id="ai" iconClass="fa-solid fa-sparkles text-amber-400" label="ผู้ช่วย AI (Gemini)" />
                  </div>

                </nav>
                {/* เปลี่ยนปุ่ม Fetch เป็นสถานะ Sync */}
                <div className="p-4 mt-auto border-t border-slate-800 bg-slate-900/90 backdrop-blur flex items-center justify-center gap-2 text-sm font-medium">
                  {isLoading ? (
                      <span className="text-blue-400"><i className="fa-solid fa-circle-notch fa-spin"></i> กำลังซิงค์ข้อมูล...</span>
                  ) : firebaseError ? (
                      <span className="text-red-400 text-xs text-center"><i className="fa-solid fa-circle-xmark"></i> พบปัญหาการเชื่อมต่อ</span>
                  ) : (
                      <span className="text-emerald-500"><i className="fa-solid fa-cloud-check"></i> ซิงค์เรียลไทม์แล้ว</span>
                  )}
                </div>
              </aside>

              <main className="flex-1 overflow-y-auto p-4 md:p-8 relative w-full">
                
                <div className="hidden md:flex absolute top-4 right-8 z-10 items-center gap-2 text-emerald-600 text-xs font-bold bg-emerald-50 px-4 py-2 rounded-full border border-emerald-200 shadow-sm animate-in fade-in">
                    <i className="fa-solid fa-cloud-bolt"></i>
                    ระบบคลาวด์อัตโนมัติ
                </div>

                {/* --- 1. หน้า Dashboard --- */}
                {activeTab === 'dashboard' && (
                  <div className="max-w-7xl mx-auto space-y-6 animate-in fade-in duration-500 pt-8 md:pt-0">
                    <header className="mb-4 flex flex-col md:flex-row md:justify-between md:items-start gap-4">
                      <div>
                          <div className="flex items-center gap-3">
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 bg-white border border-slate-200 shadow-sm rounded-lg hover:bg-slate-50 text-slate-600 transition-colors hidden md:block">
                                <i className="fa-solid fa-bars"></i>
                            </button>
                            <div>
                                <h2 className="text-xl md:text-3xl font-bold text-slate-900">ภาพรวมโครงการ</h2>
                                <p className="text-xs md:text-sm text-slate-500 mt-1">
                                    มุมมอง: <span className="font-semibold text-blue-600">{dashboardView === 'overview' ? 'ภาพรวมทั้งหมด' : dashboardView === '2026' ? 'ปี 2026 (ปัจจุบัน)' : 'ปี 2018 - 2025'}</span>
                                </p>
                            </div>
                          </div>
                      </div>

                      <div className="flex flex-wrap gap-3 bg-white p-3 rounded-xl shadow-sm border border-slate-200 items-center mt-2 md:mt-0">
                        <div className="flex items-center gap-2 w-full md:w-auto">
                            <label className="text-xs md:text-sm font-semibold text-slate-600">เดือน:</label>
                            <select value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="flex-1 md:flex-none border border-slate-300 rounded-lg px-2 py-1.5 text-xs md:text-sm bg-white outline-none">
                                <option value="All">ทั้งหมด</option>
                                {uniqueMonths.map(m => <option key={m} value={m}>{monthNames[m-1]}</option>)}
                            </select>
                        </div>
                        <div className="flex items-center gap-2 w-full md:w-auto">
                            <label className="text-xs md:text-sm font-semibold text-slate-600">ทีมงาน:</label>
                            <div className="flex-1 md:flex-none">
                                <MultiSelect options={uniqueTeams} selected={filterTeams} onChange={setFilterTeams} placeholder="ทีมงาน" />
                            </div>
                        </div>
                      </div>
                    </header>
                    
                    {firebaseError && (
                        <div className="bg-red-50 border-l-4 border-red-500 p-4 rounded-md shadow-sm mb-4">
                            <div className="flex items-center">
                                <i className="fa-solid fa-circle-exclamation text-red-500 text-xl mr-3"></i>
                                <div>
                                    <p className="text-red-700 font-bold">เกิดข้อผิดพลาดในการดึงข้อมูล</p>
                                    <p className="text-red-600 text-sm mt-1">{firebaseError}</p>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="flex flex-nowrap overflow-x-auto gap-3 md:gap-4 pb-4 pt-3 px-2 custom-scrollbar w-full">
                        <div className="bg-slate-800 text-white p-3 md:p-4 rounded-xl shadow-md border border-slate-700 flex-shrink-0 min-w-[120px] md:min-w-[160px] flex flex-col items-center justify-center gap-1 md:gap-2">
                            <p className="text-xs md:text-sm font-semibold text-slate-300 text-center w-full">จำนวนงานทั้งหมด</p>
                            <p className="text-3xl md:text-5xl font-bold text-center w-full">{totalTasksCount}</p>
                        </div>
                        {sortedStatuses.map((status, idx) => {
                            const isSelected = selectedStatuses.length === 0 || selectedStatuses.includes(status);
                            const bg = getStatusColor(status, isSelected ? 0.15 : 0.05);
                            const border = getStatusColor(status, isSelected ? 1 : 0.2);
                            const text = getStatusColor(status, isSelected ? 1 : 0.4);

                            return (
                                <div 
                                    key={idx} 
                                    onClick={() => toggleStatusFilter(status)}
                                    className={`p-3 md:p-4 rounded-xl shadow-md border-b-4 cursor-pointer transition-all duration-200 select-none flex-shrink-0 min-w-[120px] md:min-w-[160px] flex flex-col justify-between ${isSelected ? 'scale-100 ring-2 ring-offset-2' : 'scale-95 opacity-70 hover:opacity-100'}`}
                                    style={{ backgroundColor: bg, borderColor: border, '--tw-ring-color': border }}
                                >
                                    <div className="flex justify-between items-start">
                                        <p className="text-xs md:text-sm font-bold truncate pr-2 whitespace-normal leading-tight" title={status} style={{ color: text }}>{status}</p>
                                        {isSelected && selectedStatuses.length > 0 && <i className="fa-solid fa-circle-check text-xs md:text-sm mt-1" style={{ color: text }}></i>}
                                    </div>
                                    <p className="text-2xl md:text-4xl font-bold mt-2 md:mt-4" style={{ color: text }}>{statusCounts[status]}</p>
                                </div>
                            );
                        })}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 lg:col-span-1 flex flex-col relative">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-base md:text-lg font-bold flex items-center gap-2"><i className="fa-solid fa-chart-pie text-blue-600"></i> สัดส่วนสถานะงาน</h3>
                                {selectedStatuses.length > 0 && <span className="text-[10px] font-bold bg-blue-100 text-blue-700 px-2 py-1 rounded-full">Filtered</span>}
                            </div>
                            <div className="relative flex-1 w-full flex flex-col items-center justify-center min-h-[250px] md:min-h-[300px]">
                                {chartFilteredTasks.length > 0 ? (
                                    <>
                                        <div className="relative mx-auto flex items-center justify-center w-48 h-48 md:w-60 md:h-60">
                                            <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-10">
                                                <span className="text-3xl md:text-5xl font-extrabold text-slate-800 leading-none">{chartFilteredTasks.length}</span>
                                                <span className="text-xs md:text-sm font-bold text-slate-500 uppercase tracking-widest mt-1.5">CIDs</span>
                                            </div>
                                            <ChartComponent type="doughnut" data={statusChartData} options={statusChartOptions} />
                                        </div>
                                        <div className="mt-6 md:mt-8 flex flex-wrap justify-center gap-x-4 gap-y-2 px-2">
                                            {chartSortedStatuses.map(s => (
                                                <div key={s} className="flex items-center gap-1.5 text-[10px] md:text-xs font-medium text-slate-600">
                                                    <span className="w-2.5 md:w-3 h-2.5 md:h-3 rounded-full shadow-sm" style={{ backgroundColor: getStatusColor(s, 1) }}></span>
                                                    {s} <span className="text-slate-400">({chartStatusCounts[s]})</span>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                ) : (
                                    <p className="text-slate-400 flex h-full items-center justify-center">ไม่มีข้อมูลตามสถานะที่เลือก</p>
                                )}
                            </div>
                        </div>

                        <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 lg:col-span-2">
                            <h3 className="text-base md:text-lg font-bold mb-4 flex items-center gap-2"><i className="fa-solid fa-chart-column text-blue-600"></i> สรุปการจัดเก็บรายเดือน {dashboardView !== 'overview' && <span className="text-xs md:text-base font-normal">({dashboardView === 'history' ? '2018-2025' : dashboardView})</span>}</h3>
                            <div className="relative h-60 md:h-72 w-full">
                                <ChartComponent type="bar" data={monthlyChartData} options={monthlyChartOptions} />
                            </div>
                        </div>

                        <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 lg:col-span-2">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-base md:text-lg font-bold flex items-center gap-2"><i className="fa-solid fa-users text-blue-600"></i> ปริมาณงานและสถานะแยกตามทีม</h3>
                            </div>
                            <div className="relative h-64 md:h-80 w-full overflow-x-auto custom-scrollbar pb-2">
                                <div className="min-w-[500px] md:min-w-[600px] h-full">
                                    {chartFilteredTasks.length > 0 ? (
                                        <ChartComponent type="bar" data={teamChartData} options={teamChartOptions} />
                                    ) : <p className="text-slate-400 text-center mt-20">ไม่มีข้อมูล</p>}
                                </div>
                            </div>
                        </div>

                        <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 lg:col-span-1">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-base md:text-lg font-bold flex items-center gap-2"><i className="fa-solid fa-triangle-exclamation text-red-600"></i> เกินกำหนดนัดหมาย</h3>
                            </div>
                            <div className="relative h-64 md:h-80 w-full overflow-x-auto custom-scrollbar pb-2">
                                <div className="min-w-[300px] h-full">
                                    {chartFilteredTasks.length > 0 ? (
                                        <ChartComponent type="bar" data={overdueChartData} options={overdueChartOptions} />
                                    ) : <p className="text-slate-400 text-center mt-20">ไม่มีข้อมูล</p>}
                                </div>
                            </div>
                        </div>

                    </div>
                  </div>
                )}

                {/* --- 2. หน้าตารางงาน --- */}
                {activeTab === 'tasks' && (
                  <div className="max-w-full mx-auto space-y-4 animate-in fade-in duration-500 pt-8 md:pt-0">
                    <header className="flex flex-col md:flex-row justify-between items-start gap-4 mb-2">
                      <div className="flex items-center gap-3">
                        <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 bg-white border border-slate-200 shadow-sm rounded-lg hover:bg-slate-50 text-slate-600 transition-colors hidden md:block">
                            <i className="fa-solid fa-bars"></i>
                        </button>
                        <div>
                            <h2 className="text-xl md:text-3xl font-bold text-slate-900">ข้อมูลตารางงานทั้งหมด</h2>
                        </div>
                      </div>
                    </header>

                    {firebaseError && (
                        <div className="bg-red-50 border-l-4 border-red-500 p-4 rounded-md shadow-sm mb-4">
                            <div className="flex items-center">
                                <i className="fa-solid fa-circle-exclamation text-red-500 text-xl mr-3"></i>
                                <div>
                                    <p className="text-red-700 font-bold">ไม่สามารถดึงข้อมูลตารางได้</p>
                                    <p className="text-red-600 text-sm mt-1">{firebaseError}</p>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="bg-white p-3 md:p-4 rounded-xl shadow-sm border border-slate-200 space-y-3 md:space-y-4">
                        <div className="flex flex-col md:flex-row items-center gap-3 md:gap-4">
                            <div className="relative w-full">
                                <i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                <input type="text" placeholder="พิมพ์คำค้นหา (ค้นหาได้ทุกคอลัมน์)..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full bg-slate-50 border border-slate-300 rounded-lg pl-10 pr-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium" />
                            </div>
                        </div>
                        
                        <div className="flex flex-wrap items-center gap-2 md:gap-3 pt-3 border-t border-slate-100">
                            <span className="text-xs md:text-sm font-semibold text-slate-600 hidden md:inline-block"><i className="fa-solid fa-filter mr-1"></i> ตัวกรอง:</span>
                            {teamCol && (
                                <div className="w-[calc(50%-4px)] sm:w-auto"><MultiSelect options={uniqueTeams} selected={tableFilterTeams} onChange={setTableFilterTeams} placeholder="ทีมงาน" /></div>
                            )}
                            {cidCol && (
                                <select value={tableFilterCID} onChange={e => setTableFilterCID(e.target.value)} className="border border-slate-300 rounded-lg px-2 py-1.5 text-xs md:text-sm bg-white outline-none w-[calc(50%-4px)] sm:w-auto md:max-w-[140px] truncate h-[38px]">
                                    <option value="All">CID (ทั้งหมด)</option>
                                    {uniqueCIDs.map(t => <option key={t} value={t}>{t}</option>)}
                                </select>
                            )}
                            {dateCol && (
                                <select value={tableFilterDate} onChange={e => setTableFilterDate(e.target.value)} className="border border-slate-300 rounded-lg px-2 py-1.5 text-xs md:text-sm bg-white outline-none w-[calc(50%-4px)] sm:w-auto md:max-w-[140px] truncate h-[38px]">
                                    <option value="All">วันที่เข้าเก็บ (ทั้งหมด)</option>
                                    {uniqueDates.map(t => <option key={t} value={t}>{t}</option>)}
                                </select>
                            )}
                            {equipYearCol && (
                                <select value={tableFilterYear} onChange={e => setTableFilterYear(e.target.value)} className="border border-slate-300 rounded-lg px-2 py-1.5 text-xs md:text-sm bg-white outline-none w-[calc(50%-4px)] sm:w-auto md:max-w-[140px] truncate h-[38px]">
                                    <option value="All">ปี Equipment (ทั้งหมด)</option>
                                    {uniqueYears.map(t => <option key={t} value={t}>{t}</option>)}
                                </select>
                            )}
                            {statusCol && (
                                <select value={tableFilterStatus} onChange={e => setTableFilterStatus(e.target.value)} className="border border-slate-300 rounded-lg px-2 py-1.5 text-xs md:text-sm bg-white outline-none w-[calc(50%-4px)] sm:w-auto md:max-w-[140px] truncate h-[38px]">
                                    <option value="All">Status (ทั้งหมด)</option>
                                    {uniqueStatuses.map(t => <option key={t} value={t}>{t}</option>)}
                                </select>
                            )}
                            
                            {/* เมนูตัวกรอง 'นัดหมายลูกค้า' */}
                            {overDueCol && (
                                <select value={tableFilterOverdue} onChange={e => setTableFilterOverdue(e.target.value)} className="border border-slate-300 rounded-lg px-2 py-1.5 text-xs md:text-sm bg-white outline-none w-full sm:w-auto md:max-w-[140px] truncate h-[38px]">
                                    <option value="All">นัดหมายลูกค้า (ทั้งหมด)</option>
                                    <option value="ครบกำหนด">ครบกำหนด (0 วัน)</option>
                                    <option value="ยังไม่ครบกำหนด">ยังไม่ครบกำหนด (เหลือ...)</option>
                                    <option value="เกินกำหนด">เกินกำหนด (เกิน...)</option>
                                </select>
                            )}
                            
                            {/* กลุ่มปุ่มจัดการคอลัมน์ จัดชิดขวา */}
                            <div className="ml-auto flex flex-wrap items-center gap-2 mt-2 md:mt-0 w-full sm:w-auto">
                                <ColumnToggle columns={columns} hiddenColumns={hiddenColumns} setHiddenColumns={setHiddenColumns} />
                                <button onClick={resetFilters} className="flex-1 sm:flex-none flex items-center justify-center gap-1.5 text-xs md:text-sm font-bold text-red-600 hover:text-white bg-red-50 hover:bg-red-500 px-3 md:px-4 py-1.5 rounded-lg border border-red-200 hover:border-red-500 transition-colors h-[38px]">
                                    <i className="fa-solid fa-rotate-left"></i> ล้างตัวกรอง
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                      <div className="overflow-x-auto table-container max-h-[60vh]">
                        <table className="w-full text-left border-collapse text-sm" style={{ tableLayout: 'auto' }}>
                          <thead className="sticky top-0 z-10 bg-slate-800 shadow-sm">
                            <tr>
                              {visibleColumns.length > 0 ? visibleColumns.map((col, idx) => {
                                  const hasFixedWidth = colWidths[col] !== undefined;
                                  return (
                                      <th 
                                          key={idx} 
                                          className="border-r border-slate-700 p-0 align-middle relative group hover:bg-slate-700 transition-colors select-none"
                                          style={hasFixedWidth ? { width: colWidths[col], minWidth: colWidths[col], maxWidth: colWidths[col] } : { whiteSpace: 'nowrap' }}
                                      >
                                          <div className="th-content text-xs md:text-sm font-semibold text-white px-2 md:px-4 py-2 md:py-3">
                                              {col}
                                          </div>
                                          <div 
                                              onMouseDown={(e) => handleMouseDown(e, col)}
                                              onDoubleClick={() => handleDoubleClickResize(col)}
                                              title="ลากปรับขนาด / ดับเบิ้ลคลิกพอดีข้อความ"
                                              className="absolute right-0 top-0 bottom-0 w-4 cursor-col-resize z-10 hover:bg-blue-500 flex flex-col justify-center items-center transition-colors opacity-0 group-hover:opacity-100"
                                          >
                                              <div className="w-[2px] h-4 bg-white/60 rounded-full pointer-events-none"></div>
                                          </div>
                                      </th>
                                  );
                              }) : (
                                  <th className="p-4 text-white">ตารางงาน</th>
                              )}
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-200">
                            {isLoading ? (
                                <tr><td colSpan={Math.max(visibleColumns.length, 1)} className="p-8 text-center text-slate-500"><i className="fa-solid fa-circle-notch fa-spin text-blue-500 mr-2"></i>กำลังดึงข้อมูล...</td></tr>
                            ) : firebaseError ? (
                                <tr><td colSpan={Math.max(visibleColumns.length, 1)} className="p-8 text-center text-red-500"><i className="fa-solid fa-triangle-exclamation mr-2"></i>ไม่พบข้อมูล กรุณาตรวจสอบการตั้งค่า Firebase</td></tr>
                            ) : tasks.length === 0 ? (
                                <tr><td colSpan={Math.max(visibleColumns.length, 1)} className="p-8 text-center text-slate-500">ฐานข้อมูลว่างเปล่า (รอการซิงค์ข้อมูลจาก Sheet)</td></tr>
                            ) : tableTasks.length === 0 ? (
                                <tr><td colSpan={Math.max(visibleColumns.length, 1)} className="p-8 text-center text-slate-500">ไม่พบข้อมูลที่ค้นหา...</td></tr>
                            ) : tableTasks.map((task) => (
                              <tr key={task.id} className="hover:bg-slate-50 transition-colors">
                                {visibleColumns.map((col, idx) => {
                                    const hasFixedWidth = colWidths[col] !== undefined;
                                    const isStatusCell = col === statusCol;
                                    const isTeamCell = col === teamCol;
                                    const isOverDueCell = col === overDueCol; 
                                    
                                    const val = task[col] || '';
                                    const cleanVal = getCleanStatus(val);
                                    let cellStyle = "editable-cell text-xs md:text-sm";
                                    let styleObj = {};
                                    
                                    if (isStatusCell) {
                                        const color = getStatusColor(cleanVal, 0.1);
                                        const textColor = getStatusColor(cleanVal, 1);
                                        styleObj = { backgroundColor: color, color: textColor, fontWeight: 'bold', borderRadius: '6px' };
                                    } else if (isTeamCell) {
                                        const tColor = getTeamColorStyle(val);
                                        styleObj = { backgroundColor: tColor.bg, color: tColor.text, border: `1px solid ${tColor.border}`, fontWeight: 'bold', textAlign: 'center', borderRadius: '6px' };
                                    } else if (isOverDueCell && cleanVal) {
                                        let num = NaN;
                                        const match = cleanVal.match(/-?\d+/);
                                        if(match) num = parseInt(match[0], 10);

                                        if (cleanVal.includes('เกิน') || cleanVal.includes('over') || num < 0) {
                                            styleObj = { backgroundColor: '#fee2e2', color: '#991b1b', fontWeight: 'bold', textAlign: 'center', borderRadius: '6px' };
                                        } else if (num === 0 || cleanVal.includes('ครบกำหนด') || cleanVal === '0') {
                                            styleObj = { backgroundColor: '#fef08a', color: '#854d0e', fontWeight: 'bold', textAlign: 'center', borderRadius: '6px' }; 
                                        } else if (num > 0 || cleanVal.includes('เหลือ')) {
                                            styleObj = { backgroundColor: '#dcfce7', color: '#14532d', fontWeight: 'bold', textAlign: 'center', borderRadius: '6px' };
                                        }
                                    }

                                    return (
                                        <td 
                                            key={idx} 
                                            className="p-1 md:p-1.5 align-middle border-r border-slate-100 overflow-hidden text-ellipsis"
                                            style={hasFixedWidth ? { width: colWidths[col], minWidth: colWidths[col], maxWidth: colWidths[col] } : { whiteSpace: 'nowrap' }}
                                        >
                                            {isStatusCell ? (
                                                <div className="flex items-stretch w-full transition-colors mx-auto" style={styleObj}>
                                                    <div 
                                                        contentEditable="true"
                                                        suppressContentEditableWarning={true}
                                                        className="flex-1 px-2 md:px-3 py-1 outline-none whitespace-nowrap overflow-hidden text-ellipsis text-center"
                                                        style={{ minHeight: '28px', lineHeight: '20px' }}
                                                        onBlur={e => handleCellChange(task.id, col, e.target.innerText)}
                                                        title={val}
                                                    >
                                                        {val}
                                                    </div>
                                                    <div className="relative w-5 md:w-6 flex-shrink-0 flex items-center justify-center hover:bg-black/10 rounded-r-md cursor-pointer" title="เลือกจากสถานะเดิม">
                                                        <i className="fa-solid fa-chevron-down text-[10px]"></i>
                                                        <select 
                                                            className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                                                            onChange={e => {
                                                                if (e.target.value) handleCellChange(task.id, col, e.target.value);
                                                                e.target.value = ''; 
                                                            }}
                                                        >
                                                            <option value="" disabled selected></option>
                                                            {uniqueStatuses.map(s => <option key={s} value={s}>{s}</option>)}
                                                        </select>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div 
                                                    contentEditable="true"
                                                    suppressContentEditableWarning={true}
                                                    className={cellStyle} 
                                                    style={{ ...styleObj, minHeight: '28px', cursor: 'text' }}
                                                    onBlur={e => handleCellChange(task.id, col, e.target.innerText)} 
                                                    title={val}
                                                >
                                                    {val}
                                                </div>
                                            )}
                                        </td>
                                    )
                                })}
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                      
                      <div className="bg-slate-50 border-t border-slate-200 p-2 md:p-3 px-3 md:px-5 flex items-center justify-between">
                          <div className="text-xs md:text-sm font-semibold text-blue-700 flex items-center gap-2 bg-blue-100 px-3 py-1.5 rounded-lg border border-blue-200 shadow-sm">
                              <i className="fa-solid fa-list-check"></i>
                              แสดงผลทั้งหมด {tableTasks.length} รายการ
                          </div>
                          <div className="text-[10px] md:text-xs text-slate-400">แก้ไขข้อมูลเพื่อซิงค์ไปที่ Firebase โดยตรง</div>
                      </div>
                    </div>
                  </div>
                )}

                {/* --- 3. หน้าปฏิทิน --- */}
                {activeTab === 'calendar' && (
                  <div className="max-w-7xl mx-auto space-y-6 animate-in fade-in duration-500 pt-8 md:pt-0">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-4 md:mb-8">
                      <div className="flex items-center gap-3">
                        <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 bg-white border border-slate-200 shadow-sm rounded-lg hover:bg-slate-50 text-slate-600 transition-colors hidden md:block">
                            <i className="fa-solid fa-bars"></i>
                        </button>
                        <div>
                            <h2 className="text-xl md:text-3xl font-bold text-slate-900">ปฏิทิน (Calendar)</h2>
                            <p className="text-xs md:text-sm text-slate-500 mt-1">ข้อมูลจะดึงมาจากตารางงานอัตโนมัติ ชี้ที่นัดหมายเพื่อดูรายละเอียด</p>
                        </div>
                      </div>
                      <div className="flex flex-col items-end gap-3 w-full md:w-auto">
                        <div className="flex bg-slate-200 p-1 rounded-lg w-full sm:w-auto">
                          <button onClick={() => setCalendarView('day')} className={`flex-1 sm:flex-none px-3 md:px-4 py-1.5 text-xs md:text-sm font-semibold rounded-md ${calendarView === 'day' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600'}`}>รายวัน</button>
                          <button onClick={() => setCalendarView('week')} className={`flex-1 sm:flex-none px-3 md:px-4 py-1.5 text-xs md:text-sm font-semibold rounded-md ${calendarView === 'week' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600'}`}>สัปดาห์</button>
                          <button onClick={() => setCalendarView('month')} className={`flex-1 sm:flex-none px-3 md:px-4 py-1.5 text-xs md:text-sm font-semibold rounded-md ${calendarView === 'month' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600'}`}>เดือน</button>
                        </div>
                        <div className="flex items-center justify-between w-full md:w-auto gap-4">
                          <h3 className="text-base md:text-xl font-bold text-blue-700 min-w-[140px] md:min-w-[180px] text-left md:text-right">
                            {calendarView === 'month' && `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`}
                            {calendarView === 'week' && `สัปดาห์ที่ ${currentDate.getDate()} ${monthNames[currentDate.getMonth()]}`}
                            {calendarView === 'day' && `${currentDate.getDate()} ${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`}
                          </h3>
                          <div className="flex gap-1 shrink-0">
                            <button onClick={() => navigateCalendar(-1)} className="p-1.5 md:p-2 bg-white border rounded-lg hover:bg-slate-50"><i className="fa-solid fa-chevron-left text-xs md:text-base"></i></button>
                            <button onClick={() => setCurrentDate(new Date())} className="px-2 md:px-3 bg-white border rounded-lg hover:bg-slate-50 text-xs md:text-sm font-bold">วันนี้</button>
                            <button onClick={() => navigateCalendar(1)} className="p-1.5 md:p-2 bg-white border rounded-lg hover:bg-slate-50"><i className="fa-solid fa-chevron-right text-xs md:text-base"></i></button>
                          </div>
                        </div>
                      </div>
                    </header>

                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                      {calendarView === 'month' && (
                        <div className="grid grid-cols-7 gap-px bg-slate-200">
                          {['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'].map((d, i) => (
                            <div key={d} className="bg-slate-50 py-2 md:py-3 text-center text-xs md:text-sm font-semibold text-slate-600">
                                <span className="md:hidden">{d}</span>
                                <span className="hidden md:inline">{['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'][i]}</span>
                            </div>
                          ))}
                          {monthSlots.map((dateObj, idx) => {
                            const dayTasks = getTasksForDateObj(dateObj);
                            return (
                              <div key={idx} className="bg-white min-h-[100px] md:min-h-[140px] p-1 md:p-2 flex flex-col">
                                {dateObj && (
                                  <>
                                    <div className="text-right mb-0.5 md:mb-1">
                                      <span 
                                        onClick={() => { setCalendarView('day'); setCurrentDate(dateObj); }}
                                        title="คลิกเพื่อดูรายละเอียดรายวัน"
                                        className={`inline-block w-6 h-6 md:w-7 md:h-7 leading-6 md:leading-7 text-center rounded-full text-xs md:text-sm font-semibold cursor-pointer hover:scale-110 ${dateObj.getDate() === new Date().getDate() && dateObj.getMonth() === new Date().getMonth() ? 'bg-blue-600 text-white shadow-md' : 'text-slate-700 bg-slate-100 hover:bg-blue-100 hover:text-blue-700 transition-all'}`}
                                      >
                                        {dateObj.getDate()}
                                      </span>
                                    </div>
                                    <div className="flex-1 space-y-1 md:space-y-1.5 overflow-y-auto max-h-[80px] md:max-h-[120px] table-container pr-1">
                                      {dayTasks.map(t => {
                                          const bg = getStatusColor(t[statusCol] || '', 0.1);
                                          const border = getStatusColor(t[statusCol] || '', 1);
                                          return (
                                            <div key={t.id} style={{backgroundColor: bg, borderColor: border}} className="p-1 md:p-1.5 rounded-lg border-l-2 md:border-l-4 shadow-sm text-[10px] md:text-xs space-y-0.5 cursor-pointer hover:shadow-md transition-shadow" onMouseMove={(e) => handleMouseMove(e, t)} onMouseLeave={handleMouseLeave} onClick={() => { if(window.innerWidth <= 768) { setCalendarView('day'); setCurrentDate(dateObj); } }}>
                                              {compCol && <div className="font-bold text-slate-800 truncate" title={t[compCol]}>{t[compCol]}</div>}
                                              {keyMap.colB && <div className="text-[8px] md:text-[10px] text-slate-600 truncate">{t[keyMap.colB]}</div>}
                                              <div className="text-[8px] md:text-[10px] font-semibold mt-1 truncate" style={{color: border}}>[{t[statusCol]}]</div>
                                            </div>
                                          );
                                      })}
                                    </div>
                                  </>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      )}

                      {calendarView === 'week' && (
                        <div className="grid grid-cols-7 gap-px bg-slate-200">
                          {weekSlots.map((dateObj, idx) => (
                            <div key={idx} className="bg-slate-50 py-2 md:py-3 text-center border-b border-slate-200">
                              <div className="text-[10px] md:text-sm font-semibold text-slate-500">
                                  <span className="md:hidden">{['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'][dateObj.getDay()]}</span>
                                  <span className="hidden md:inline">{['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'][dateObj.getDay()]}</span>
                              </div>
                              <div 
                                onClick={() => { setCalendarView('day'); setCurrentDate(dateObj); }}
                                title="คลิกเพื่อดูรายละเอียดรายวัน"
                                className={`text-base md:text-2xl font-bold mt-1 cursor-pointer transition-colors inline-block px-2 md:px-3 py-0.5 md:py-1 rounded-lg hover:bg-blue-100 hover:text-blue-700 ${dateObj.getDate() === new Date().getDate() && dateObj.getMonth() === new Date().getMonth() ? 'text-blue-600' : 'text-slate-800'}`}
                              >
                                {dateObj.getDate()}
                              </div>
                            </div>
                          ))}
                          {weekSlots.map((dateObj, idx) => {
                            const dayTasks = getTasksForDateObj(dateObj);
                            return (
                              <div key={`w-${idx}`} className="bg-white min-h-[300px] md:min-h-[500px] p-1 md:p-2 flex flex-col gap-1.5 md:gap-2 bg-slate-50/50">
                                {dayTasks.map(t => {
                                    const border = getStatusColor(t[statusCol] || '', 1);
                                    const softBg = getStatusColor(t[statusCol] || '', 0.1);
                                    return (
                                      <div key={t.id} style={{borderLeftColor: border}} className="p-1.5 md:p-3 rounded-lg md:rounded-xl border border-l-2 md:border-l-4 shadow-sm bg-white text-[10px] md:text-xs space-y-1 md:space-y-1.5 cursor-pointer hover:shadow-md transition-shadow" onMouseMove={(e) => handleMouseMove(e, t)} onMouseLeave={handleMouseLeave} onClick={() => { if(window.innerWidth <= 768) { setCalendarView('day'); setCurrentDate(dateObj); } }}>
                                        {compCol && <div className="font-bold text-slate-800 break-words leading-tight line-clamp-2">{t[compCol]}</div>}
                                        {keyMap.colB && <div className="text-slate-500 font-medium truncate">{keyMap.colB}: {t[keyMap.colB]}</div>}
                                        {keyMap.colD && <div className="text-slate-500 truncate">{keyMap.colD}: {t[keyMap.colD]}</div>}
                                        <div className="flex items-center gap-1 text-slate-500 font-medium bg-slate-50 p-1 rounded text-[8px] md:text-xs">
                                            <i className="fa-regular fa-clock"></i> {t[timeCol] || '-'}
                                        </div>
                                        <div className="mt-1 md:mt-2 text-center font-bold px-1 md:px-2 py-0.5 md:py-1 rounded-md md:rounded-lg border text-[8px] md:text-xs" style={{backgroundColor: softBg, color: border, borderColor: border}}>{t[statusCol]}</div>
                                      </div>
                                    )
                                })}
                              </div>
                            );
                          })}
                        </div>
                      )}

                      {calendarView === 'day' && (() => {
                        const dayTasks = getTasksForDateObj(currentDate);
                        return (
                          <div className="p-4 md:p-6 bg-white min-h-[500px]">
                            <h4 className="text-base md:text-lg font-bold text-slate-800 mb-4 md:mb-6 border-b pb-3 md:pb-4 flex justify-between items-center">
                              <span><i className="fa-regular fa-calendar-check text-blue-600 mr-2"></i> ตารางงานประจำวัน</span>
                              <span className="text-xs md:text-sm font-medium bg-blue-50 text-blue-700 px-3 md:px-4 py-1 md:py-1.5 rounded-full shadow-sm">{dayTasks.length} งาน</span>
                            </h4>
                            {dayTasks.length === 0 ? (
                              <div className="text-center text-slate-400 py-12 md:py-20 flex flex-col items-center">
                                  <i className="fa-regular fa-calendar-xmark text-4xl md:text-6xl mb-3 md:mb-4 text-slate-200"></i>
                                  <p className="text-sm md:text-lg font-medium">ไม่มีงานที่ต้องดำเนินการในวันนี้</p>
                              </div>
                            ) : (
                              <div className="space-y-3 md:space-y-4">
                                {dayTasks.map(t => {
                                    const bgColor = getStatusColor(t[statusCol] || '', 1);
                                    const softBg = getStatusColor(t[statusCol] || '', 0.1);
                                    return (
                                      <div key={t.id} className="flex bg-white rounded-xl md:rounded-2xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition-shadow cursor-pointer" onMouseMove={(e) => handleMouseMove(e, t)} onMouseLeave={handleMouseLeave}>
                                        <div style={{backgroundColor: bgColor}} className="w-2 md:w-3 shrink-0"></div>
                                        <div className="p-3 md:p-5 flex-1 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2 md:gap-4 lg:items-center text-xs md:text-sm">
                                          {keyMap.colB && <div><p className="text-[10px] md:text-xs text-slate-400 font-semibold uppercase tracking-wider">{keyMap.colB}</p><p className="font-bold text-slate-800 truncate text-sm md:text-base">{t[keyMap.colB] || '-'}</p></div>}
                                          {compCol && <div><p className="text-[10px] md:text-xs text-slate-400 font-semibold uppercase tracking-wider">{compCol}</p><p className="font-bold text-slate-800 truncate text-sm md:text-base">{t[compCol] || '-'}</p></div>}
                                          {keyMap.colD && <div><p className="text-[10px] md:text-xs text-slate-400 font-semibold uppercase tracking-wider">{keyMap.colD}</p><p className="text-slate-700 truncate">{t[keyMap.colD] || '-'}</p></div>}
                                          {keyMap.colE && <div><p className="text-[10px] md:text-xs text-slate-400 font-semibold uppercase tracking-wider">{keyMap.colE}</p><p className="text-slate-700 truncate">{t[keyMap.colE] || '-'}</p></div>}
                                          {keyMap.colF && <div><p className="text-[10px] md:text-xs text-slate-400 font-semibold uppercase tracking-wider">{keyMap.colF}</p><p className="text-slate-700 truncate">{t[keyMap.colF] || '-'}</p></div>}
                                          {keyMap.colG && <div><p className="text-[10px] md:text-xs text-slate-400 font-semibold uppercase tracking-wider">{keyMap.colG}</p><p className="text-slate-700 font-bold bg-slate-100 px-2 py-1 rounded inline-block mt-0.5 md:mt-1">{t[keyMap.colG] || '-'}</p></div>}
                                          <div className="sm:col-span-2 md:col-span-3 lg:col-span-2 flex justify-start lg:justify-end mt-2 md:mt-0">
                                              <span style={{backgroundColor: softBg, color: bgColor, borderColor: bgColor}} className="font-bold px-4 md:px-6 py-1.5 md:py-2 rounded-lg md:rounded-xl border-2 text-center min-w-[120px] md:min-w-[160px] shadow-sm">
                                                  {t[statusCol] || 'ไม่มีสถานะ'}
                                              </span>
                                          </div>
                                        </div>
                                      </div>
                                    )
                                })}
                              </div>
                            )}
                          </div>
                        );
                      })()}
                    </div>
                  </div>
                )}

                {/* --- 4. หน้าผู้ช่วย AI (Gemini) --- */}
                {activeTab === 'ai' && (
                  <div className="max-w-4xl mx-auto flex flex-col h-[calc(100vh-2rem)] animate-in fade-in duration-500 pt-8 md:pt-0 pb-4">
                    <header className="mb-4 shrink-0 flex items-center gap-3">
                        <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 bg-white border border-slate-200 shadow-sm rounded-lg hover:bg-slate-50 text-slate-600 transition-colors hidden md:block">
                            <i className="fa-solid fa-bars"></i>
                        </button>
                        <div>
                            <h2 className="text-xl md:text-3xl font-bold text-slate-900 flex items-center gap-2"><i className="fa-solid fa-sparkles text-amber-500"></i> ผู้ช่วย AI อัจฉริยะ</h2>
                            <p className="text-xs md:text-sm text-slate-500 mt-1">วิเคราะห์ข้อมูล พิมพ์คำถามเกี่ยวกับตารางงานของคุณได้เลย</p>
                        </div>
                    </header>

                    <div className="flex-1 bg-white rounded-2xl shadow-md border border-slate-200 flex flex-col overflow-hidden">
                        
                        {/* แชทประวัติ */}
                        <div className="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 bg-slate-50 custom-scrollbar">
                            {chatHistory.map((msg, index) => (
                                <div key={index} className={`flex w-full ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[85%] md:max-w-[75%] rounded-2xl p-4 shadow-sm ${msg.role === 'user' ? 'bg-blue-600 text-white rounded-tr-sm' : 'bg-white border border-slate-200 text-slate-700 rounded-tl-sm'}`}>
                                        {msg.role === 'model' && <div className="text-[10px] font-bold text-amber-500 mb-1 uppercase tracking-wider"><i className="fa-solid fa-robot mr-1"></i> Gemini AI</div>}
                                        <div className="text-sm md:text-base leading-relaxed whitespace-pre-wrap" dangerouslySetInnerHTML={{ __html: msg.text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>') }}></div>
                                    </div>
                                </div>
                            ))}
                            {isChatLoading && (
                                <div className="flex w-full justify-start">
                                    <div className="bg-white border border-slate-200 rounded-2xl p-4 rounded-tl-sm shadow-sm flex gap-2">
                                        <div className="w-2 h-2 bg-slate-300 rounded-full animate-bounce"></div>
                                        <div className="w-2 h-2 bg-slate-300 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                                        <div className="w-2 h-2 bg-slate-300 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div>
                                    </div>
                                </div>
                            )}
                            <div ref={chatEndRef} />
                        </div>

                        {/* กล่องข้อความ และ ปุ่มแนะนำ */}
                        <div className="p-4 border-t border-slate-200 bg-white">
                            <div className="flex flex-wrap gap-2 mb-3">
                                <button onClick={() => handleAskGemini('สรุปจำนวนงานแบ่งตามสถานะให้หน่อย')} className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium px-3 py-1.5 rounded-full transition-colors border border-slate-200">สรุปตามสถานะ</button>
                                <button onClick={() => handleAskGemini('มีงานของทีมไหนบ้างที่เกินกำหนด?')} className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium px-3 py-1.5 rounded-full transition-colors border border-slate-200">งานที่เกินกำหนด</button>
                                <button onClick={() => handleAskGemini('บอกชื่องานที่รอเข้าเก็บให้หน่อย')} className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium px-3 py-1.5 rounded-full transition-colors border border-slate-200">งานที่รอเข้าเก็บ</button>
                            </div>
                            <div className="flex gap-2 items-center relative">
                                <input 
                                    type="text" 
                                    value={chatInput} 
                                    onChange={e => setChatInput(e.target.value)} 
                                    onKeyPress={handleKeyPress}
                                    placeholder="พิมพ์คำถามของคุณที่นี่..." 
                                    className="flex-1 bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all text-sm shadow-inner"
                                    disabled={isChatLoading}
                                />
                                <button 
                                    onClick={() => handleAskGemini()} 
                                    disabled={isChatLoading || !chatInput.trim()}
                                    className={`w-12 h-12 flex items-center justify-center rounded-xl transition-all ${!chatInput.trim() || isChatLoading ? 'bg-slate-200 text-slate-400' : 'bg-blue-600 text-white hover:bg-blue-700 shadow-md active:scale-95'}`}
                                >
                                    <i className="fa-solid fa-paper-plane"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                  </div>
                )}
              </main>

              {/* Tooltip Component (กล่องลอยแสดงรายละเอียด - ตรวจสอบพิกัดไม่ให้ล้นจอมือถือ) */}
              {tooltipData.visible && tooltipData.task && (
                <div className="fixed z-[9999] bg-white p-4 md:p-5 rounded-xl md:rounded-2xl shadow-2xl border border-slate-200 w-[280px] md:w-80 pointer-events-none transition-opacity duration-150" style={{ left: tooltipData.x, top: tooltipData.y }}>
                    <div className="flex justify-between items-start mb-3 md:mb-4 border-b border-slate-100 pb-2 md:pb-3">
                        <h4 className="font-bold text-slate-800 text-sm md:text-base break-words pr-2 leading-snug">{tooltipData.task[compCol] || 'ไม่ระบุองค์กร/บริษัท'}</h4>
                        <span className="text-[9px] md:text-[10px] font-bold px-2 py-1 rounded-lg whitespace-nowrap" style={{ backgroundColor: getTeamColorStyle(tooltipData.task[teamCol]).bg, color: getTeamColorStyle(tooltipData.task[teamCol]).text }}>
                            {tooltipData.task[teamCol] || 'ไม่ระบุทีม'}
                        </span>
                    </div>
                    
                    <div className="flex justify-between items-center mb-2 md:mb-3 pb-2 md:pb-3 border-b border-slate-200 border-dashed">
                        <div>
                            <span className="font-semibold text-slate-500 text-[9px] md:text-[10px] block uppercase tracking-wider">วันที่ และ เวลา:</span>
                            <span className="text-emerald-600 text-xs md:text-sm font-bold flex items-center gap-1.5 mt-1">
                                <i className="fa-regular fa-calendar-check"></i> {tooltipData.task[dateCol] || '-'} 
                                <span className="text-slate-500 mx-1">|</span> 
                                <i className="fa-regular fa-clock"></i> {tooltipData.task[timeCol] || '-'}
                            </span>
                        </div>
                    </div>

                    <div className="space-y-2 md:space-y-3 text-[11px] md:text-xs text-slate-600 max-h-[250px] md:max-h-[300px] overflow-y-auto pr-1 table-container">
                        {columns.map(col => {
                            if (skipColsInTooltip.includes(col)) return null;
                            const val = tooltipData.task[col];
                            if (!val || String(val).trim() === '') return null;
                            if (String(val).includes('@') && String(val).includes('.')) return null;

                            const isStatus = col === statusCol;
                            const isNote = col === noteCol;

                            return (
                                <div key={col} className={`flex flex-col ${isNote ? 'bg-amber-50 p-2 md:p-2.5 rounded-lg border border-amber-200 mt-2 md:mt-3' : ''}`}>
                                    <span className={`font-semibold text-[9px] md:text-[10px] uppercase tracking-wider ${isNote ? 'text-amber-700' : 'text-slate-400'}`}>{col}</span>
                                    {isStatus ? (
                                        <span className="inline-block mt-1 px-2.5 md:px-3 py-1 rounded-lg font-bold border" style={{ backgroundColor: getStatusColor(val, 0.2), color: getStatusColor(val, 1), borderColor: getStatusColor(val, 1), width: 'fit-content' }}>{val}</span>
                                    ) : (
                                        <span className={`text-slate-800 break-words whitespace-pre-wrap mt-0.5 ${isNote ? 'font-medium leading-relaxed' : ''}`}>{val}</span>
                                    )}
                                </div>
                            )
                        })}
                    </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
